<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER STATION - DIVE MODE v1.8</title>
    <style>
        :root { 
            --main-orange: #FF8C00; 
            --bg-black: #000000; 
            --tile-size: 13px; 
            --font-main: 'Courier New', monospace;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: var(--font-main); 
            background: var(--bg-black); 
            color: var(--main-orange); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100dvh; overflow: hidden; 
            touch-action: none;
            border: 2px solid var(--main-orange); 
        }

        /* --- 상단 상태 바 (이미지 기반 슬림 최적화) --- */
        header { 
            padding: 8px 15px; /* 수직 여백 최소화 */
            border-bottom: 1px solid var(--main-orange); 
            background: #000; flex-shrink: 0;
            text-align: center;
        }
        .protocol-title { 
            font-size: 0.55em; 
            opacity: 0.6; 
            letter-spacing: 1.5px; 
            margin-bottom: 4px; 
        }
        .case-title { 
            font-size: 1.0em; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 0 3px var(--main-orange); 
            margin-bottom: 8px; 
            letter-spacing: 0.5px;
        }
        .status-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            font-size: 0.65em; 
            border-top: 1px solid #221100; 
            padding-top: 6px;
            gap: 5px;
        }
        .stat-val { color: #fff; font-weight: bold; margin-left: 2px; }

        /* --- 로그 섹션 (이미지 말풍선 스타일) --- */
        #log-section { 
            flex: 1; overflow-y: auto; padding: 15px; 
            background: rgba(5,5,5,0.98); 
            border-bottom: 1px solid var(--main-orange);
            -webkit-overflow-scrolling: touch;
        }
        .msg { margin-bottom: 12px; font-size: 0.82em; line-height: 1.4; padding: 8px; word-break: break-all; }
        
        /* 시스템 메시지 스타일 */
        .msg.system { border: 1px dashed var(--main-orange); color: #888; text-align: center; background: #000; margin: 10px 0; }

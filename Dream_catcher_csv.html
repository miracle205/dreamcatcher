<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v3.2.9 - TRUE IDENTITY</title>
    <style>
        :root {
            --theme: #FF8C00; --sub: rgba(255, 140, 0, 0.15); --bg: #0a0a0a;
            --font-main: 'Courier New', Courier, monospace;
        }

        /* [기본] 흰색 전면 금지. 모든 기본 색상은 테마색 상속 */
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; background: #000; color: var(--theme); 
        }

        #game-container {
            width: 100%; max-width: 600px; height: 100vh;
            margin: 0 auto; display: flex; flex-direction: column;
            border-left: 1.5px solid var(--theme); border-right: 1.5px solid var(--theme);
            background: #0d0d0d; box-sizing: border-box;
        }

        /* [TOP] 상단 50vh 고정 */
        .top-half {
            flex: 0 0 50vh; display: flex; flex-direction: column;
            border-bottom: 2px solid var(--theme); box-sizing: border-box;
        }

        #header {
            flex: 0 0 auto; height: 80px; padding: 12px 15px;
            display: flex; flex-direction: column; justify-content: center;
            background: rgba(0, 0, 0, 0.9); box-sizing: border-box;
        }
        /* 라벨 가독성: 흰색 대신 테마색 + brightness로 해결 */
        .protocol-line { font-size: 10px; color: var(--theme); filter: brightness(1.8); font-weight: bold; letter-spacing: 1px; }
        .case-line { font-size: 19px; font-weight: bold; margin: 2px 0; color: var(--theme); text-shadow: 0 0 8px var(--theme); }
        .status-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--theme); filter: brightness(1.5); }

        #log-container { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 16px;
            box-sizing: border-box;
        }

        /* [BOTTOM] 하단 50vh 고정 */
        #bottom-interface {
            flex: 0 0 50vh; display: flex; flex-direction: column; 
            padding: 15px; background: #050505; box-sizing: border-box; gap: 12px;
        }

        #minimap-sector { flex: 1; border: 1.5px solid var(--theme); background: #000; display: flex; align-items: center; justify-content: center; min-height: 0; }
        #minimap { display: grid; gap: 2px; }
        .cell { width: 14px; height: 14px; background: #1a1a1a; }
        .cell.active { background: var(--theme); box-shadow: 0 0 8px var(--theme); }

        #action-sector { flex: 1.5; display: grid; grid-template-rows: repeat(4, 1fr); gap: 6px; min-height: 0; }

        button {
            width: 100%; height: 100%; background: transparent; 
            border: 1.2px solid var(--theme); color: var(--theme);
            text-align: left; padding: 0 15px; font-family: inherit;
            font-size: 14px; font-weight: bold; cursor: pointer;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        button:disabled { opacity: 0.15; }
        button:hover:not(:disabled) { background: var(--theme); color: #000; }

        /* [디자인 위계 스타일] */
        .msg-box { max-width: 85%; padding: 11px 15px; font-size: 14.5px; line-height: 1.6; word-break: keep-all; color: var(--theme); }
        .box-subject { align-self: flex-start; background: var(--theme); color: #000 !important; font-weight: bold; border-radius: 12px 12px 12px 2px; }
        .box-me { align-self: flex-end; background: #000; border: 1.5px solid var(--theme); border-radius: 12px 12px 2px 12px; }
        .box-system { align-self: center; width: 92%; background: var(--sub); border: 1px dashed var(--theme); text-align: center; font-size: 12.5px; color: var(--theme) !important; filter: brightness(1.7); text-shadow: 0 0 5px var(--theme); }
        .box-cmd { align-self: flex-start; border: 2.5px dotted var(--theme); border-radius: 4px; padding: 10px; font-weight: bold; filter: brightness(1.3); }
        .box-none { align-self: center; width: 100%; text-align: center; opacity: 0.8; }
        .italic { font-style: italic; }

        #log-container::-webkit-scrollbar { width: 3px; }
        #log-container::-webkit-scrollbar-thumb { background: var(--theme); }
    </style>
</head>
<body onclick="skipTypewriter()">
    <div id="game-container">
        <div class="top-half">
            <div id="header">
                <div id="ui-protocol" class="protocol-line">PROTOCOL: INITIALIZING</div>
                <div id="ui-title" class="case-line">AI HUNTER</div>
                <div class="status-row">
                    <span>SYNC: <span id="val-sync">100.0</span>%</span>
                    <span>POINT: <span id="val-point">--</span></span>
                </div>
            </div>
            <div id="log-container"></div>
        </div>
        <div id="bottom-interface">
            <div id="minimap-sector"><div id="minimap"></div></div>
            <div id="action-sector">
                <button id="opt1">[ --- ]</button>
                <button id="opt2">[ --- ]</button>
                <button id="opt3">[ --- ]</button>
                <button id="opt4">[ --- ]</button>
            </div>
        </div>
    </div>

    <script>
        // (v3.2.7~8과 동일한 핵심 JS 로직 탑재, applyTheme만 가독성 보강됨)
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", isTyping = false, shouldSkip = false;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);
                initMinimap();
                applyTitleConfig();
                playPoint(currentPoint);
            } catch (e) { console.error("BOOT_ERROR"); }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).filter(line => line.trim()).map(line => {
                let values = [], current = '', inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { values.push(current); current = ''; }
                    else { current += char; }
                }
                values.push(current);
                return headers.reduce((obj, h, i) => { obj[h] = values[i] ? values[i].trim() : ""; return obj; }, {});
            });
        }

        async function playPoint(point) {
            if (isTyping) return;
            const events = scenarioData.filter(r => r.point === point && r.point !== 'TITLE');
            if (events.length === 0) return;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);
            for (const ev of events) {
                let raw = ev.Content || "", text = raw, boxClass = "box-me", isItalic = false;
                if (raw.includes('[시스템]') || raw.includes('[SYSTEM]') || raw.includes('[!]')) boxClass = 'box-system';
                else if (raw.includes('지령실:') || raw.includes('본부:')) boxClass = 'box-cmd';
                else if (raw.includes('의뢰인:') || raw.includes('대상자:') || raw.includes('박사님,')) boxClass = 'box-subject';
                else if (raw.startsWith('(독백)') || (raw.startsWith('(') && raw.endsWith(')'))) {
                    boxClass = 'box-none'; isItalic = true;
                    text = raw.replace(/^\(독백\)\s*/, "").replace(/^\(|\)$/g, "").trim();
                } else if (raw.startsWith('(묘사)') || (raw.startsWith('<') && raw.endsWith('>'))) {
                    boxClass = 'box-none';
                    text = raw.replace(/^\(묘사\)\s*/, "").replace(/^<|>$/g, "").trim();
                }
                await typeWriter(text, boxClass, isItalic);
            }
            updateButtons(events[events.length - 1]);
        }

        async function typeWriter(text, boxClass, isItalic) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${boxClass} ${isItalic ? 'italic' : ''}`;
            container.appendChild(div);
            for (let char of text) {
                if (shouldSkip) { div.innerText = text; break; }
                div.innerText += char;
                container.scrollTop = container.scrollHeight;
                await new Promise(r => setTimeout(r, 30));
            }
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`p-${point}`);
            if (cell) cell.classList.add('active');
        }

        function updateButtons(ev) {
            setBtn(document.getElementById('opt1'), ev.Opt1, ev.T1_point);
            setBtn(document.getElementById('opt2'), ev.Opt2, ev.T2_point);
            setBtn(document.getElementById('opt3'), ev.Opt3, ev.T3_point);
            setBtn(document.getElementById('opt4'), ev.Opt4, ev.T4_point);
        }

        function setBtn(btn, label, target) {
            if (label && label !== "-" && label !== "") {
                btn.innerText = label.startsWith('>') ? label : `> ${label}`;
                btn.disabled = false;
                btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
            } else { btn.innerText = "[ --- ]"; btn.disabled = true; }
        }

        function applyTitleConfig() {
            const row = scenarioData.find(r => r.point === 'TITLE');
            if (row) {
                document.getElementById('ui-title').innerText = row.Content;
                if (row.AreaID) applyTheme(row.AreaID);
            }
        }

        function applyTheme(modeId) {
            const cfg = configData.find(c => c.ID === modeId);
            if (!cfg) return;
            const r = document.documentElement.style;
            r.setProperty('--theme', cfg.ThemeColor);
            r.setProperty('--sub', cfg.SubColor);
            r.setProperty('--bg', cfg.BGColor);
            document.getElementById('ui-protocol').innerText = `PROTOCOL: ${cfg.AreaName}`;
            const mini = document.getElementById('minimap-sector');
            const act = document.getElementById('action-sector');
            if (modeId === 'M1') { mini.style.display = 'none'; act.style.flex = '2.5'; }
            else { mini.style.display = 'flex'; act.style.flex = '1.5'; }
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(6, 1fr)`;
            for (let i = 0; i < 42; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `p-${(i % 6) + 1}-${Math.floor(i / 6) + 1}`;
                map.appendChild(cell);
            }
        }
        window.onload = boot;
    </script>
</body>
</html>

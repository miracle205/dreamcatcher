<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v3.1.0 REBOOT</title>
    <style>
        :root {
            --theme: #FF8C00; --sub: #804600; --bg: #0B0500;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg); color: var(--theme);
            font-family: var(--font-main); margin: 0; padding: 10px;
            display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box; overflow: hidden;
        }

        /* [TOP] Header - 스크린샷 위계 재현 */
        #header {
            border-bottom: 2px solid var(--sub); padding-bottom: 8px; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .protocol-line { font-size: 10px; letter-spacing: 2px; opacity: 0.7; font-weight: bold; }
        .case-line { font-size: 20px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .status-row { 
            display: flex; gap: 15px; font-size: 11px; 
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; margin-top: 4px;
        }

        /* [MIDDLE] Log Window - 3종 박스 폼 */
        #log-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { padding: 14px; font-size: 15px; line-height: 1.6; word-break: keep-all; }
        
        .box-system { border: 1px dashed var(--sub); background: rgba(255, 255, 255, 0.03); opacity: 0.9; }
        .box-filled { background: var(--theme); color: var(--bg); font-weight: bold; }
        .box-solid { border-left: 5px solid var(--sub); border-top: 1px solid rgba(255,255,255,0.05); background: rgba(255, 255, 255, 0.02); }

        /* [BOTTOM] Control Interface */
        #bottom-interface {
            display: flex; height: 170px; gap: 12px;
            border-top: 2px solid var(--sub); padding-top: 12px;
        }
        #minimap-sector {
            flex: 0 0 160px; border: 1px solid var(--sub); 
            display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5);
        }
        #minimap { display: grid; gap: 2px; }
        .cell { width: 18px; height: 18px; background: rgba(255,255,255,0.05); }
        .cell.active { background: var(--theme); box-shadow: 0 0 15px var(--theme); }

        #action-sector { flex: 1; display: flex; flex-direction: column; gap: 7px; }
        button {
            background: none; border: 1.5px solid var(--sub); color: var(--theme);
            padding: 10px 15px; text-align: left; cursor: pointer;
            font-family: inherit; font-size: 14px; font-weight: bold;
        }
        button:hover:not(:disabled) { background: var(--theme); color: var(--bg); }
        button:disabled { opacity: 0.2; cursor: default; }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="header">
        <div id="ui-protocol" class="protocol-line">DREAMCATCHER PROTOCOL - INITIALIZING...</div>
        <div id="ui-title" class="case-line">CASE: SYNCING...</div>
        <div class="status-row">
            <span>SYNC: <span id="val-sync">100.0</span>%</span>
            <span>CLEAN: 100%</span>
            <span>STRESS: 0%</span>
            <span style="margin-left:auto">POINT: <span id="val-point">--</span></span>
        </div>
    </div>

    <div id="log-container"></div>

    <div id="bottom-interface">
        <div id="minimap-sector"><div id="minimap"></div></div>
        <div id="action-sector">
            <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
            <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
            <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
            <button id="opt4" onclick="handleOption(4)">[ --- ]</button>
        </div>
    </div>

    <script>
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", currentMode = "", syncValue = 100.0;
        let isTyping = false, shouldSkip = false;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);
                
                initMinimap();
                loadTitle(); // TITLE 행 선행 처리
                playPoint(currentPoint);
            } catch (e) { console.error("BOOT_ERR"); }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] }), {});
            });
        }

        function loadTitle() {
            const row = scenarioData.find(r => r.point === 'TITLE');
            if (row) {
                document.getElementById('ui-title').innerText = row.Content;
                if (row.Mode) applyTheme(row.Mode);
            }
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(6, 1fr)`;
            for (let i = 0; i < 42; i++) { // 6x7
                const cell = document.createElement('div');
                cell.className = 'cell';
                const x = (i % 6) + 1; const y = Math.floor(i / 6) + 1;
                cell.id = `p-${x}-${y}`;
                map.appendChild(cell);
            }
        }

        async function playPoint(point) {
            if (isTyping) return;
            const events = scenarioData.filter(r => r.point === point && r.point !== 'TITLE');
            if (events.length === 0) return;

            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);

            for (const ev of events) {
                if (ev.Mode) applyTheme(ev.Mode);
                
                let boxClass = 'box-solid';
                let text = ev.Content || "";
                
                if (text.includes('[시스템]')) {
                    text = text.replace('[시스템]', '[system]');
                    boxClass = 'box-system';
                } else if (text.startsWith('[!]') || text.includes('의뢰인:')) {
                    boxClass = 'box-filled';
                }

                await typeWriter(text, boxClass);
                if (ev.Action && ev.Action.includes('SYNC+')) {
                    syncValue += parseFloat(ev.Action.split('+')[1]);
                    document.getElementById('val-sync').innerText = syncValue.toFixed(1);
                }
            }
            updateButtons(events[events.length - 1]);
        }

        async function typeWriter(text, boxClass) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${boxClass}`;
            container.appendChild(div);

            for (let char of text) {
                if (shouldSkip) { div.innerText = text; break; }
                div.innerText += char;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
                container.scrollTop = container.scrollHeight;
            }
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`p-${point}`);
            if (cell) cell.classList.add('active');
        }

        // [v2.7.6 방식 하드코딩] - 데이터 오염 원천 봉쇄
        function updateButtons(ev) {
            const b1 = document.getElementById('opt1'), b2 = document.getElementById('opt2');
            const b3 = document.getElementById('opt3'), b4 = document.getElementById('opt4');

            setBtn(b1, ev.Opt1, ev.T1_point);
            setBtn(b2, ev.Opt2, ev.T2_point);
            setBtn(b3, ev.Opt3, ev.T3_point);
            setBtn(b4, ev.Opt4, ev.T4_point);
        }

        function setBtn(btn, label, target) {
            if (label && label !== "-" && label !== "") {
                btn.innerText = label.startsWith('>') ? label : `> ${label}`;
                btn.disabled = false;
                btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
            } else {
                btn.innerText = "[ --- ]";
                btn.disabled = true;
                btn.onclick = null;
            }
        }

        function applyTheme(modeId) {
            if (currentMode === modeId) return;
            const cfg = configData.find(c => c.ID === modeId);
            if (!cfg) return;

            const r = document.documentElement.style;
            r.setProperty('--theme', cfg.ThemeColor);
            r.setProperty('--sub', cfg.SubColor);
            r.setProperty('--bg', cfg.BGColor);

            let protocol = "DREAMCATCHER PROTOCOL - ";
            if (modeId === "M1") protocol += "INITIAL INQUIRY";
            else if (modeId === "M2") protocol += "NEURAL DIVING";
            else if (modeId === "M3") protocol += "DATA EXTRACTION";
            else protocol += modeId;

            document.getElementById('ui-protocol').innerText = protocol;
            window.typeSpeed = parseInt(cfg.Speed) || 30;
            currentMode = modeId;
        }

        window.onload = boot;
    </script>
</body>
</html>

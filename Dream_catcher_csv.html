<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER PROTOCOL v3.0.4</title>
    <style>
        :root {
            --theme: #FF8C00;
            --sub: #804600;
            --bg: #0B0500;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--theme);
            font-family: var(--font-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* 1. 상단 레이아웃 (수치 및 타이틀) */
        #header {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 2px solid var(--sub);
            padding-bottom: 5px; margin-bottom: 8px;
        }
        .title-group { display: flex; flex-direction: column; gap: 2px; }
        .mode-id { font-size: 9px; opacity: 0.6; letter-spacing: 2px; }
        .case-title { font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        .status-group { text-align: right; font-size: 11px; line-height: 1.2; }

        /* 2. 중앙 로그창 (스크린샷 기반 3종 박스 폼) */
        #log-container {
            flex: 1; overflow-y: auto;
            margin-bottom: 12px; padding-right: 5px;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .msg-box { 
            padding: 12px; font-size: 14px; line-height: 1.6; word-break: keep-all;
            transition: opacity 0.3s ease;
        }

        /* [system] : 얇은 점선(Dashed) 박스 */
        .box-system { 
            border: 1px dashed var(--sub); 
            background: rgba(255, 255, 255, 0.03); 
            color: #aaa; opacity: 0.8;
        }

        /* [!] 또는 중요 대사 : 배경이 꽉 찬(Filled) 박스 */
        .box-filled { 
            background: var(--theme); 
            color: var(--bg); 
            font-weight: bold; border: none;
        }

        /* 일반 대사 : 실선(Solid) 및 특정 강조 */
        .box-solid { 
            border-top: 1px solid var(--sub);
            border-left: 4px solid var(--sub);
            background: rgba(255, 255, 255, 0.01);
        }

        /* 3. 하단 레이아웃 (가변 맵 & 버튼) */
        #bottom-interface {
            display: flex; height: 160px; gap: 10px;
            border-top: 2px solid var(--sub); padding-top: 10px;
        }

        /* 하단 왼쪽: 가변 미니맵 (6x7) */
        #minimap-sector {
            flex: 0 0 160px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--sub); background: rgba(0,0,0,0.4);
        }
        #minimap { display: grid; gap: 2px; }
        .cell { width: 18px; height: 18px; background: rgba(255,255,255,0.05); }
        .cell.active { background: var(--theme); box-shadow: 0 0 12px var(--theme); }

        /* 하단 오른쪽: 액션 버튼 (브라켓 스타일 고수) */
        #action-sector { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .opt-btn {
            background: none; border: 1px solid var(--sub); color: var(--theme);
            padding: 10px 15px; text-align: left; cursor: pointer;
            font-family: var(--font-main); font-size: 13px;
        }
        .opt-btn:hover { background: var(--theme); color: var(--bg); border-color: var(--theme); }
        .opt-btn::before { content: "[ "; }
        .opt-btn::after { content: " ]"; float: right; }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="header">
        <div class="title-group">
            <span id="ui-mode" class="mode-id">WAITING...</span>
            <span id="ui-title" class="case-title">DREAMCATCHER v3.0.4</span>
        </div>
        <div class="status-group">
            <div>SYNC: <span id="val-sync">0.0</span>%</div>
            <div>POINT: <span id="val-point">--</span></div>
        </div>
    </div>

    <div id="log-container"></div>

    <div id="bottom-interface">
        <div id="minimap-sector">
            <div id="minimap"></div>
        </div>
        <div id="action-sector"></div>
    </div>

    <script>
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", syncValue = 100.0, currentMode = "";
        let isTyping = false, shouldSkip = false;
        const MAP_W = 6, MAP_H = 7;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);
                initMinimap();
                playPoint(currentPoint);
            } catch (e) {
                console.error(e);
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] }), {});
            });
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(${MAP_W}, 1fr)`;
            map.innerHTML = '';
            for (let y = 1; y <= MAP_H; y++) {
                for (let x = 1; x <= MAP_W; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.id = `p-${x}-${y}`;
                    map.appendChild(cell);
                }
            }
        }

        async function playPoint(point) {
            if (isTyping) return;
            const events = scenarioData.filter(r => r.point === point);
            if (events.length === 0) return;

            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);
            
            document.getElementById('action-sector').innerHTML = '';

            for (const ev of events) {
                if (ev.Mode) applyTheme(ev.Mode);
                
                // 로그 박스 타입 판별 로직
                let boxType = 'box-solid';
                if (ev.Content.startsWith('[system]')) boxType = 'box-system';
                else if (ev.Content.startsWith('[!]') || ev.Content.includes('의뢰인:')) boxType = 'box-filled';

                await typeWriter(ev.Content, boxType);
                
                if (ev.Action && ev.Action.includes('SYNC+')) {
                    syncValue += parseInt(ev.Action.split('+')[1]);
                    document.getElementById('val-sync').innerText = syncValue.toFixed(1);
                }
            }
            renderButtons(events[events.length - 1]);
        }

        async function typeWriter(text, boxClass) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${boxClass}`;
            container.appendChild(div);

            for (let char of text) {
                if (shouldSkip) { div.innerText = text; break; }
                div.innerText += char;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
                container.scrollTop = container.scrollHeight;
            }
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const activeCell = document.getElementById(`p-${point}`);
            if (activeCell) activeCell.classList.add('active');
        }

        function renderButtons(event) {
            const container = document.getElementById('action-sector');
            // 버튼은 오직 Opt1~4만 참조하도록 엄격히 분리
            const opts = [
                { l: event.Opt1, t: event.T1_point },
                { l: event.Opt2, t: event.T2_point },
                { l: event.Opt3, t: event.T3_point },
                { l: event.Opt4, t: event.T4_point }
            ];

            opts.forEach(opt => {
                if (opt.l && opt.l !== "-" && opt.l !== "") {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = opt.l.startsWith('>') ? opt.l : `> ${opt.l}`;
                    btn.onclick = (e) => { e.stopPropagation(); playPoint(opt.t); };
                    container.appendChild(btn);
                }
            });
        }

        function applyTheme(modeId) {
            if (currentMode === modeId) return;
            const cfg = configData.find(c => c.ID === modeId);
            if (cfg) {
                const r = document.documentElement.style;
                r.setProperty('--theme', cfg.ThemeColor);
                r.setProperty('--sub', cfg.SubColor);
                r.setProperty('--bg', cfg.BGColor);
                document.getElementById('ui-mode').innerText = cfg.ID;
                document.getElementById('ui-title').innerText = cfg.Title;
                window.typeSpeed = parseInt(cfg.Speed) || 30;
                currentMode = modeId;
            }
        }

        window.onload = boot;
    </script>
</body>
</html>

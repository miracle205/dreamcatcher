<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v2.7.9</title>
    <style>
        :root { --amber: #ff8c00; --amber-dim: #804600; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { background: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        body { display: flex; flex-direction: column; height: 100dvh; text-transform: uppercase; }
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 4px, 3px 100%; z-index: 100; pointer-events: none; }
        #header { border-bottom: 2px solid var(--amber); padding: 8px 12px; background: rgba(10, 5, 0, 0.9); z-index: 50; display: flex; justify-content: space-between; font-size: 0.85em; flex-shrink: 0; }
        #main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #log-container { flex: 1; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        #log-content { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 200px; }
        .log-entry { margin-bottom: 18px; line-height: 1.6; font-size: 1.1em; text-align: center; }
        #controls { height: 240px; border-top: 2px solid var(--amber); background: #080808; display: flex; flex-shrink: 0; z-index: 60; }
        #minimap-slot { width: 150px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--amber-dim); }
        #minimap-container { width: 130px; height: 130px; border: 1px solid #222; }
        #button-slot { flex: 1; display: flex; flex-direction: column; gap: 7px; padding: 12px; padding-top: 40px; position: relative; }
        #distance-counter { position: absolute; top: 12px; left: 15px; font-size: 0.9em; color: var(--amber-dim); font-weight: bold; }
        button { background: none; border: 1px solid var(--amber-dim); color: var(--amber); padding: 10px; cursor: pointer; font-family: inherit; font-size: 1.0em; text-align: center; width: 100%; min-height: 42px; }
        button:disabled { border-color: #222; color: #222; opacity: 0.2; }
        .cursor { display: inline-block; width: 8px; height: 1.1em; background: var(--amber); vertical-align: middle; margin-left: 7px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div id="header">
    <div>LOC: [<span id="area-name">---</span>]<br>STAT: <span id="area-desc">---</span></div>
    <div style="text-align:right">SYNC: 100%<br>DIST: <span id="dist-val">000</span>M</div>
</div>
<div id="main-container"><div id="log-container"><div id="log-content"></div></div></div>
<div id="controls">
    <div id="minimap-slot"><div id="minimap-container"><canvas id="minimap-canvas" width="130" height="130"></canvas></div></div>
    <div id="button-slot">
        <div id="distance-counter">AVAILABLE COMMANDS</div>
        <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
        <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
        <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
        <button id="opt4" onclick="handleOption(4)">[ BACK ]</button>
    </div>
</div>

<script>
    let playerPos = { x: 0, y: 0 }, history = [], scenarioData = [], mapData = [], completedActions = {}, totalDistance = 0;

    async function init() {
        try {
            const v = Date.now();
            console.log("System Initializing...");
            const [scRes, mapRes] = await Promise.all([fetch(`scenario.csv?v=${v}`), fetch(`map.csv?v=${v}`)]);
            
            const scText = await scRes.text();
            console.log("Scenario Loaded. Parsing...");
            scenarioData = parseCSV(scText);
            
            const mapText = await mapRes.text();
            mapData = mapText.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.split(',').map(cell => cell.trim()));
            
            mapData.forEach((row, y) => { row.forEach((tile, x) => { if (tile === 'S') { playerPos = { x, y }; history = [{...playerPos}]; console.log(`Starting Point Found: ${x}-${y}`); } }); });
            
            updateState();
            requestAnimationFrame(renderLoop);
        } catch (e) { 
            console.error("CRITICAL ERROR:", e);
            addLog("SYSTEM ERROR: DATA_LOAD_FAILED");
        }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#'));
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const row = {};
            let cells = [], current = '', inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
                else { current += char; }
            }
            cells.push(current.trim());
            headers.forEach((h, idx) => { row[h] = cells[idx] || ""; });
            return row;
        });
    }

    function updateState() {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        console.log(`Searching for Coord: ${posStr}`);
        const ev = scenarioData.find(row => row.Coord === posStr);
        
        if (ev) {
            console.log("Scenario Data Match Found!");
            const area = scenarioData.find(row => row.AreaID === ev.AreaID && !row.Coord);
            if (area) { 
                document.getElementById('area-name').innerText = area.AreaName; 
                document.getElementById('area-desc').innerText = area.AreaDesc; 
            }
            addLog(ev.Content);
            updateButtons(ev);
            document.getElementById('dist-val').innerText = String(totalDistance).padStart(3, '0');
        } else {
            console.warn(`No scenario data found for coord: ${posStr}`);
            addLog(`[SYSTEM] NO DATA AT ${posStr}`);
        }
    }

    function addLog(text) {
        if(!text) return;
        const logContent = document.getElementById('log-content');
        const oldCursor = document.querySelector('.cursor');
        if (oldCursor) oldCursor.remove();
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerText = text;
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        div.appendChild(cursor);
        logContent.appendChild(div);
        document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight;
    }

    function updateButtons(ev) {
        for (let i = 1; i <= 3; i++) {
            const btn = document.getElementById(`opt${i}`);
            const text = ev[`Opt${i}`];
            if (text) { btn.innerText = text; btn.disabled = false; }
            else { btn.innerText = "[ --- ]"; btn.disabled = true; }
        }
    }

    function handleOption(num) {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (!ev) return;
        let next = ev[`T${num}_Coord`];
        if (next) {
            const p = next.split('-');
            playerPos = { x: Number(p[0]), y: Number(p[1]) };
            totalDistance += 10;
            updateState();
        }
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimap-canvas');
        const ctx = canvas.getContext('2d');
        const ts = 15, off = 10; // 테스트용 큰 타일
        ctx.clearRect(0, 0, 130, 130);
        mapData.forEach((row, y) => { row.forEach((tile, x) => {
            if(tile !== '0') {
                ctx.fillStyle = (tile === 'S' || tile === '1') ? '#332200' : 'var(--amber)';
                ctx.fillRect(x*ts+off, y*ts+off, ts-2, ts-2);
            }
        }); });
        ctx.fillStyle = "#fff";
        ctx.fillRect(playerPos.x*ts+off, playerPos.y*ts+off, ts-2, ts-2);
    }

    function renderLoop() { drawMinimap(); requestAnimationFrame(renderLoop); }
    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v3.0.9</title>
    <style>
        :root {
            --theme: #FF8C00;
            --sub: #804600;
            --bg: #0B0500;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--theme);
            font-family: var(--font-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box;
            overflow: hidden;
            transition: background 0.5s, color 0.5s;
        }

        /* [TOP] 스크린샷 기반 상단 레이아웃 */
        #header {
            border-bottom: 2px solid var(--sub);
            padding-bottom: 8px; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .protocol-line { font-size: 10px; letter-spacing: 2px; opacity: 0.7; font-weight: bold; }
        .case-line { font-size: 20px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .status-row { 
            display: flex; gap: 15px; font-size: 11px; 
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; margin-top: 4px;
        }

        /* [MIDDLE] 로그창 3종 폼 */
        #log-container {
            flex: 1; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            padding-right: 5px;
        }
        .msg-box { padding: 14px; font-size: 15px; line-height: 1.6; word-break: keep-all; }
        
        .box-system { border: 1px dashed var(--sub); background: rgba(255, 255, 255, 0.03); color: var(--theme); opacity: 0.9; }
        .box-filled { background: var(--theme); color: var(--bg); font-weight: bold; }
        .box-solid { border-left: 5px solid var(--sub); border-top: 1px solid rgba(255,255,255,0.05); background: rgba(255, 255, 255, 0.02); }

        /* [BOTTOM] 하단 인터페이스 */
        #bottom-interface {
            display: flex; height: 165px; gap: 12px;
            border-top: 2px solid var(--sub); padding-top: 12px;
        }

        #minimap-sector {
            flex: 0 0 160px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--sub); background: rgba(0,0,0,0.5);
        }
        #minimap { display: grid; gap: 2px; }
        .cell { width: 18px; height: 18px; background: rgba(255,255,255,0.05); }
        .cell.active { background: var(--theme); box-shadow: 0 0 15px var(--theme); }

        #action-sector { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .opt-btn {
            background: none; border: 1.5px solid var(--sub); color: var(--theme);
            padding: 12px 15px; text-align: left; cursor: pointer;
            font-family: var(--font-main); font-size: 14px; font-weight: bold;
        }
        .opt-btn:hover { background: var(--theme); color: var(--bg); }
        .opt-btn::before { content: "[ "; } .opt-btn::after { content: " ]"; float: right; }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="header">
        <div id="ui-protocol" class="protocol-line">DREAMCATCHER PROTOCOL - INITIALIZING...</div>
        <div id="ui-title" class="case-line">CASE: SYNCING...</div>
        <div class="status-row">
            <span>SYNC: <span id="val-sync">100.0</span>%</span>
            <span>CLEAN: 100%</span>
            <span>STRESS: 0%</span>
            <span style="margin-left:auto">POINT: <span id="val-point">--</span></span>
        </div>
    </div>

    <div id="log-container"></div>

    <div id="bottom-interface">
        <div id="minimap-sector"><div id="minimap"></div></div>
        <div id="action-sector"></div>
    </div>

    <script>
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", syncValue = 100.0, currentMode = "";
        let isTyping = false, shouldSkip = false;
        const MAP_W = 6, MAP_H = 7;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);
                
                initMinimap();
                applyTitle(); // TITLE 행 선제 처리
                playPoint(currentPoint);
            } catch (e) { console.error("FATAL_ERROR: DATA LOAD FAILED"); }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] }), {});
            });
        }

        // TITLE 행만 먼저 읽어 상단 UI 초기화
        function applyTitle() {
            const titleRow = scenarioData.find(r => r.point === 'TITLE');
            if (titleRow) {
                document.getElementById('ui-title').innerText = titleRow.Content;
                if (titleRow.Mode) applyTheme(titleRow.Mode);
            }
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(${MAP_W}, 1fr)`;
            for (let y = 1; y <= MAP_H; y++) {
                for (let x = 1; x <= MAP_W; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.id = `p-${x}-${y}`;
                    map.appendChild(cell);
                }
            }
        }

        async function playPoint(point) {
            if (isTyping) return;
            // TITLE 행은 실행에서 제외
            const events = scenarioData.filter(r => r.point === point && r.point !== 'TITLE');
            if (events.length === 0) return;

            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);
            document.getElementById('action-sector').innerHTML = ''; 

            for (const ev of events) {
                if (ev.Mode) applyTheme(ev.Mode);
                
                let boxClass = 'box-solid';
                let content = ev.Content || "";
                
                // [시스템] -> [system] 자동 변환 및 스타일링
                if (content.includes('[시스템]') || content.toLowerCase().includes('[system]')) {
                    content = content.replace('[시스템]', '[system]');
                    boxClass = 'box-system';
                } else if (content.startsWith('[!]') || content.includes('의뢰인:')) {
                    boxClass = 'box-filled';
                }

                await typeWriter(content, boxClass);
                
                if (ev.Action && ev.Action.includes('SYNC+')) {
                    syncValue += parseFloat(ev.Action.split('+')[1]);
                    document.getElementById('val-sync').innerText = syncValue.toFixed(1);
                }
            }
            
            // v2.7.6의 안정적 구조 채택: 마지막 행에서 명확하게 Opt 필드만 추출
            const finalRow = events[events.length - 1];
            updateButtons(finalRow);
        }

        async function typeWriter(text, boxClass) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${boxClass}`;
            container.appendChild(div);

            for (let char of text) {
                if (shouldSkip) { div.innerText = text; break; }
                div.innerText += char;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
                container.scrollTop = container.scrollHeight;
            }
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`p-${point}`);
            if (cell) cell.classList.add('active');
        }

        // v2.7.6 방식 환원: 열 이름을 직접 지칭하여 데이터 오염 차단
        function updateButtons(ev) {
            const container = document.getElementById('action-sector');
            container.innerHTML = ''; 

            for (let i = 1; i <= 4; i++) {
                const label = ev[`Opt${i}`];
                const target = ev[`T${i}_point`];

                if (label && label !== "-" && label !== "") {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = label.startsWith('>') ? label : `> ${label}`;
                    btn.onclick = (e) => { 
                        e.stopPropagation(); 
                        if (target && target !== "-") playPoint(target); 
                    };
                    container.appendChild(btn);
                }
            }
        }

        function applyTheme(modeId) {
            if (currentMode === modeId) return;
            const cfg = configData.find(c => c.ID === modeId);
            if (!cfg) return;

            const r = document.documentElement.style;
            r.setProperty('--theme', cfg.ThemeColor);
            r.setProperty('--sub', cfg.SubColor);
            r.setProperty('--bg', cfg.BGColor);

            // 상단 단계 텍스트 (M1~M3 줄기 준수)
            let protocol = "DREAMCATCHER PROTOCOL - ";
            if (modeId === "M1") protocol += "INITIAL INQUIRY";
            else if (modeId === "M2") protocol += "NEURAL DIVING";
            else if (modeId === "M3") protocol += "DATA EXTRACTION";
            else protocol += modeId;

            document.getElementById('ui-protocol').innerText = protocol;
            window.typeSpeed = parseInt(cfg.Speed) || 30;
            currentMode = modeId;
        }

        window.onload = boot;
    </script>
</body>
</html>

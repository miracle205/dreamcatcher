<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DREAMCATCHER BaseCamp v3.0.0</title>
    <style>
        :root {
            --amber-bright: #ffb000;
            --amber-dim: #553300;
            --bg-dark: #0a0a0a;
            --cell-size: 20px; /* 120px / 6 columns */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--amber-bright);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }

        /* Minimap Grid: 6x7 Strict Regulation */
        #minimap-container {
            border: 1px solid var(--amber-bright);
            padding: 4px;
            margin-bottom: 25px;
            background-color: #000;
        }

        #minimap {
            display: grid;
            grid-template-columns: repeat(6, var(--cell-size));
            grid-template-rows: repeat(7, var(--cell-size));
            gap: 1px;
            background-color: var(--amber-dim);
        }

        .point-cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--bg-dark);
            box-sizing: border-box;
        }

        /* Active Point: Pure Color Glow (No Text) */
        .point-cell.active {
            background-color: var(--amber-bright);
            box-shadow: 0 0 10px var(--amber-bright);
            z-index: 5;
        }

        /* Main Display Panel */
        #display-panel {
            width: 90%;
            max-width: 480px;
            border: 1px solid var(--amber-dim);
            padding: 20px;
            min-height: 240px;
            display: flex;
            flex-direction: column;
        }

        #case-info {
            font-size: 0.8rem;
            margin-bottom: 10px;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        #content-area {
            flex-grow: 1;
            line-height: 1.6;
            margin-bottom: 25px;
            word-break: keep-all;
        }

        /* Options: English UI Labeling */
        #options-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .opt-btn {
            background: none;
            border: 1px solid var(--amber-dim);
            color: var(--amber-bright);
            padding: 10px;
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .opt-btn:hover {
            border-color: var(--amber-bright);
            background-color: rgba(255, 176, 0, 0.1);
        }

        /* System Status Bar */
        #status-bar {
            width: 90%;
            max-width: 480px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            border-top: 1px solid var(--amber-dim);
            padding-top: 10px;
        }

        .feedback-msg {
            color: #fff;
            font-style: italic;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="case-info">CASE: Dive 01</div>

    <div id="minimap-container">
        <div id="minimap"></div>
    </div>

    <div id="display-panel">
        <div id="content-area">Initializing System...</div>
        <div id="options-wrapper"></div>
        <div id="feedback-area" class="feedback-msg"></div>
    </div>

    <div id="status-bar">
        <div id="pos-display">POINT: --</div>
        <div id="sync-display">SYNC: 100%</div>
    </div>

    <script>
        // Scenario Data Mapping (Based on User CSV)
        const scenario = {
            "1-1": {
                content: "[System] Diving Success. Sync rate 100%. Command: 'Diver, can you hear me? You have entered the gravity space of the surface consciousness.'",
                options: [
                    { label: "> Forward Survey", target: "1-2" },
                    { label: "> Search Surroundings", target: "2-1" },
                    { label: "> Return to Entry", target: "1-1" }
                ]
            },
            "1-2": {
                content: "Diver: 'Copy that. But this sector... it's unpleasantly quiet.' Command: 'Skip the chatter. First, recover the data fragments on the path.'",
                options: [{ label: "> Access Data", target: "1-3" }]
            },
            "1-3": {
                content: "[!] WARNING: Surface defense mechanism detected. Command: '100M left before Guardian awakens. Hurry up.'",
                action: "SYNC+5",
                feedback: "Recovery Complete: Sync Maintained.",
                options: [
                    { label: "* Salvage Fragment", target: "1-3" },
                    { label: "> To Deep Pass", target: "1-4" }
                ]
            },
            "1-4": {
                content: "Diver: 'Passage found. But I think I hear Guardian?' Command: '30M before tracking starts. Don't look back, RUN.'",
                options: [{ label: "> Enter Deep Layer", target: "1-5" }]
            },
            "1-5": {
                content: "[System] Guardian(G) Activated. Command: 'Target locked on you. From now on, any deviation from path will result in immediate lockout.'",
                options: [{ label: "> Dash to Exit", target: "1-6" }]
            },
            "1-6": {
                content: "Diver: 'Almost there! I see light!' Command: '10M to Deep Entry. JUMP!'",
                options: [{ label: "> Final Deep Entry", target: "9-9" }]
            },
            "9-9": {
                content: "[System] Deep Consciousness Entry Successful. Surface connection terminated.",
                action: "LOG_ALL",
                options: [{ label: "EXIT", target: "FINISH" }]
            }
        };

        let currentPoint = "1-1";
        let syncValue = 100;

        // Initialize 6x7 Minimap
        function initMap() {
            const map = document.getElementById('minimap');
            for (let y = 1; y <= 7; y++) {
                for (let x = 1; x <= 6; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'point-cell';
                    cell.id = `p-${x}-${y}`;
                    map.appendChild(cell);
                }
            }
            render();
        }

        function render() {
            const data = scenario[currentPoint];
            if (!data) return;

            // Update Text & Status
            document.getElementById('content-area').innerText = data.content;
            document.getElementById('pos-display').innerText = `POINT: ${currentPoint}`;
            document.getElementById('sync-display').innerText = `SYNC: ${syncValue}%`;
            document.getElementById('feedback-area').innerText = data.feedback || "";

            // Handle Action Trigger
            if (data.action === "SYNC+5") {
                syncValue += 5;
                data.action = null; // Prevent repeated triggers in this logic
            }

            // Update Minimap Active Point
            document.querySelectorAll('.point-cell').forEach(c => c.classList.remove('active'));
            const activeCell = document.getElementById(`p-${currentPoint}`);
            if (activeCell) activeCell.classList.add('active');

            // Generate Option Buttons
            const optWrapper = document.getElementById('options-wrapper');
            optWrapper.innerHTML = '';
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt.label;
                btn.onclick = () => move(opt.target);
                optWrapper.appendChild(btn);
            });
        }

        function move(target) {
            if (target === "FINISH") {
                alert("SYSTEM: [LOG_ALL] Scenario Completed.");
                return;
            }
            currentPoint = target;
            render();
        }

        window.onload = initMap;
    </script>
</body>
</html>

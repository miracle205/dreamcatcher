<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v3.2.0 - THE ORIGINAL SOUL</title>
    <style>
        :root {
            /* config.csv 로드 전 기본 테마 (M2 앰버 기준) */
            --theme: #FF8C00; 
            --sub: rgba(255, 140, 0, 0.15); 
            --bg: #0a0a0a;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg); color: var(--theme);
            font-family: var(--font-main); margin: 0; padding: 0;
            display: flex; justify-content: center; height: 100vh;
            box-sizing: border-box; overflow: hidden;
        }

        #game-container {
            width: 100%; max-width: 600px; height: 100%;
            display: flex; flex-direction: column;
            border-left: 1.5px solid var(--theme); border-right: 1.5px solid var(--theme);
            background: #0f0f0f; position: relative;
        }

        /* [TOP] Header Section */
        #header {
            flex: 0 0 auto; padding: 15px; border-bottom: 2px solid var(--theme);
            background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; gap: 4px;
        }
        .protocol-line { font-size: 10px; letter-spacing: 2px; opacity: 0.8; font-weight: bold; }
        .case-line { font-size: 20px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .status-row { 
            display: flex; justify-content: space-between; font-size: 11px; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 8px; margin-top: 5px;
        }

        /* [MIDDLE] Log Window - 6:4 비율 및 디자인 위계 */
        #log-container { 
            flex: 6; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 16px; padding: 20px; box-sizing: border-box;
        }

        /* 대화 박스 공통 애니메이션 */
        .msg-box { 
            max-width: 85%; padding: 12px 16px; font-size: 14.5px; line-height: 1.6;
            position: relative; animation: slideUp 0.35s ease-out forwards;
            word-break: keep-all; white-space: pre-wrap;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 1. 의뢰인(대상자): 배경색 꽉 참 (면 강조) */
        .box-subject { 
            align-self: flex-start; background: var(--theme); color: var(--bg);
            font-weight: bold; border-radius: 15px 15px 15px 2px;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
        }

        /* 2. 나(연구원/다이버): 배경검정 + 테두리 (선 강조) */
        .box-me { 
            align-self: flex-end; background: var(--bg); color: var(--theme);
            border: 1.5px solid var(--theme); border-radius: 15px 15px 2px 15px;
        }

        /* 3. 시스템: 반투명 배경 + 점선 */
        .box-system { 
            align-self: center; width: 92%; background: var(--sub); 
            border: 1px dashed var(--theme); color: #fff; 
            font-size: 12.5px; text-align: center; opacity: 0.9;
        }

        /* 4. 지령실/기타: 나와 구분되는 점선 테두리 */
        .box-cmd { 
            align-self: flex-start; background: transparent; 
            border: 1.2px dashed var(--theme); color: var(--theme);
            border-radius: 4px; font-style: italic;
        }

        /* 타이핑 커서 깜빡임 */
        .cursor {
            display: inline-block; width: 9px; height: 15px;
            background: currentColor; margin-left: 3px;
            animation: blink 0.8s infinite; vertical-align: middle;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* [BOTTOM] Control Interface - 40% 비율 */
        #bottom-interface {
            flex: 4; display: flex; gap: 12px; padding: 15px;
            border-top: 2px solid var(--theme); background: #050505;
        }

        #minimap-sector {
            flex: 4; border: 1px solid var(--theme); 
            display: flex; align-items: center; justify-content: center; background: #000;
        }
        #minimap { display: grid; gap: 3px; }
        .cell { width: 18px; height: 18px; background: #1a1a1a; border-radius: 1px; }
        .cell.active { background: var(--theme); box-shadow: 0 0 12px var(--theme); }

        #action-sector { flex: 6; display: flex; flex-direction: column; gap: 8px; }
        button {
            flex: 1; background: transparent; border: 1px solid var(--theme); 
            color: var(--theme); text-align: left; padding: 0 15px;
            font-family: inherit; font-size: 14px; cursor: pointer;
            transition: all 0.2s; font-weight: bold;
        }
        button:hover:not(:disabled) { background: var(--theme); color: var(--bg); }
        button:disabled { opacity: 0.1; cursor: default; }

        /* Scrollbar */
        #log-container::-webkit-scrollbar { width: 3px; }
        #log-container::-webkit-scrollbar-thumb { background: var(--theme); }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="game-container">
        <div id="header">
            <div id="ui-protocol" class="protocol-line">DREAMCATCHER PROTOCOL - INITIALIZING...</div>
            <div id="ui-title" class="case-line">CASE: SYNCING...</div>
            <div class="status-row">
                <span>SYNC: <span id="val-sync">100.0</span>%</span>
                <span style="margin-left:auto">POINT: <span id="val-point">--</span></span>
            </div>
        </div>

        <div id="log-container"></div>

        <div id="bottom-interface">
            <div id="minimap-sector"><div id="minimap"></div></div>
            <div id="action-sector">
                <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
                <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
                <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
                <button id="opt4" onclick="handleOption(4)">[ --- ]</button>
            </div>
        </div>
    </div>

    <script>
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", currentMode = "", syncValue = 100.0;
        let isTyping = false, shouldSkip = false;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);
                initMinimap();
                applyTitleConfig();
                playPoint(currentPoint);
            } catch (e) { console.error("BOOT_ERROR: CSV LOAD FAILED"); }
        }

        // [v3.1.4] 띄어쓰기 보존형 수동 파서
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).filter(line => line.trim()).map(line => {
                let values = []; let current = ''; let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === ',' && !inQuotes) { values.push(current); current = ''; }
                    else { current += char; }
                }
                values.push(current);
                return headers.reduce((obj, h, i) => {
                    obj[h] = values[i] ? values[i].trim() : "";
                    return obj;
                }, {});
            });
        }

        async function playPoint(point) {
            if (isTyping) return;
            const events = scenarioData.filter(r => r.point === point && r.point !== 'TITLE');
            if (events.length === 0) return;
            
            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);

            for (const ev of events) {
                let boxClass = 'box-me'; 
                let text = ev.Content || "";
                
                // 주체 판별 로직
                if (text.includes('[시스템]')) {
                    text = text.replace('[시스템]', '[SYSTEM]');
                    boxClass = 'box-system';
                } else if (text.includes('지령실:') || text.includes('본부:')) {
                    boxClass = 'box-cmd';
                } else if (text.includes('의뢰인:') || text.includes('대상자:') || text.includes('다이버:')) {
                    boxClass = 'box-subject';
                }

                await typeWriter(text, boxClass);
                
                if (ev.Action && ev.Action.includes('SYNC+')) {
                    syncValue += parseFloat(ev.Action.split('+')[1]);
                    document.getElementById('val-sync').innerText = syncValue.toFixed(1);
                }
            }
            updateButtons(events[events.length - 1]);
        }

        async function typeWriter(text, boxClass) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${boxClass}`;
            container.appendChild(div);

            const contentSpan = document.createElement('span');
            div.appendChild(contentSpan);
            
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            div.appendChild(cursor);

            for (let char of text) {
                if (shouldSkip) { contentSpan.innerText = text; break; }
                contentSpan.innerText += char;
                container.scrollTop = container.scrollHeight;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
            }
            
            cursor.remove(); // 타이핑 종료 시 커서 제거 (필요시 유지 가능)
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`p-${point}`);
            if (cell) cell.classList.add('active');
        }

        function updateButtons(ev) {
            setBtn(document.getElementById('opt1'), ev.Opt1, ev.T1_point);
            setBtn(document.getElementById('opt2'), ev.Opt2, ev.T2_point);
            setBtn(document.getElementById('opt3'), ev.Opt3, ev.T3_point);
            setBtn(document.getElementById('opt4'), ev.Opt4, ev.T4_point);
        }

        function setBtn(btn, label, target) {
            if (label && label !== "-" && label !== "" && label !== " ") {
                btn.innerText = label.startsWith('>') ? label : `> ${label}`;
                btn.disabled = false;
                btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
            } else { btn.innerText = "[ --- ]"; btn.disabled = true; btn.onclick = null; }
        }

        function applyTitleConfig() {
            const row = scenarioData.find(r => r.point === 'TITLE');
            if (row) {
                document.getElementById('ui-title').innerText = row.Content;
                if (row.AreaID) applyTheme(row.AreaID);
            }
        }

        function applyTheme(modeId) {
            if (currentMode === modeId) return;
            const cfg = configData.find(c => c.ID === modeId);
            if (!cfg) return;
            
            const r = document.documentElement.style;
            r.setProperty('--theme', cfg.ThemeColor);
            r.setProperty('--sub', cfg.SubColor);
            r.setProperty('--bg', cfg.BGColor);
            
            document.getElementById('ui-protocol').innerText = `DREAMCATCHER PROTOCOL - ${modeId}`;
            window.typeSpeed = parseInt(cfg.Speed) || 30;
            currentMode = modeId;
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(6, 1fr)`;
            for (let i = 0; i < 42; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const x = (i % 6) + 1; const y = Math.floor(i / 6) + 1;
                cell.id = `p-${x}-${y}`;
                map.appendChild(cell);
            }
        }

        window.onload = boot;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v2.9.2</title>
    <style>
        :root { 
            --amber: #ff8c00; --amber-dim: #804600; --bg: #0b0500; 
            --box-sys: rgba(255, 140, 0, 0.05); 
            --box-noise: rgba(139, 0, 0, 0.25); /* 코어 노이즈: 붉은 계열 */
            --box-analyst: rgba(255, 140, 0, 0.1); /* 다이버 기록: 호박색 계열 */
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { background: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin: 0; padding: 0; height: 100%; overflow: hidden; }
        body { display: flex; flex-direction: column; text-transform: uppercase; }

        /* CRT Scanline Effect */
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 4px, 3px 100%; z-index: 100; pointer-events: none; }

        /* [TOP] Status Header (Reference Style) */
        #header { 
            border-bottom: 1px solid var(--amber-dim); padding: 12px 20px; 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            font-size: 0.75em; letter-spacing: 1px; color: var(--amber-dim);
            background: rgba(10, 5, 0, 0.9); z-index: 50;
        }
        .header-title { grid-column: span 3; text-align: center; color: var(--amber); margin-bottom: 8px; font-weight: bold; border-bottom: 1px solid rgba(255,140,0,0.2); padding-bottom: 5px; }

        /* [MIDDLE] Log Window */
        #main-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        #log-container { flex: 1; padding: 20px; overflow-y: auto; scroll-behavior: smooth; }
        #log-content { display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; min-height: 100%; }

        /* Msg Box Styles */
        .msg-box { 
            padding: 18px; border-radius: 4px; border: 1px solid transparent;
            width: 100%; max-width: 95%; margin: 0 auto;
            line-height: 1.7; font-size: 1.05em; position: relative;
            word-break: keep-all; white-space: pre-wrap;
        }
        .sys-box { border: 1px dashed var(--amber-dim); background: var(--box-sys); color: var(--amber-dim); font-size: 0.9em; text-align: center; }
        .noise-box { background: var(--box-noise); border: 1px solid #4a0000; color: #ffaaaa; }
        .analyst-box { background: var(--box-analyst); border: 1px solid var(--amber-dim); color: var(--amber); }

        .msg-box:first-child { margin-top: auto; }
        .msg-box:last-child { margin-bottom: auto; }

        /* [BOTTOM] Control Center (240px Fixed) */
        #controls { height: 240px; border-top: 1px solid var(--amber-dim); background: #050200; display: flex; z-index: 60; flex-shrink: 0; }
        #minimap-slot { width: 145px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--amber-dim); }
        #minimap-container { width: 125px; height: 125px; border: 1px solid #1a1a1a; background: #000; }
        
        #button-slot { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 10px; padding-top: 35px; position: relative; overflow: hidden; }
        #dist-label { position: absolute; top: 10px; left: 15px; font-size: 0.8em; color: var(--amber-dim); letter-spacing: 1px; }

        button { 
            background: rgba(255, 140, 0, 0.05); border: 1px solid #333; color: var(--amber); 
            padding: 10px 15px; cursor: pointer; font-family: inherit; font-size: 0.95em; 
            text-align: left; width: 100%; transition: 0.1s; min-height: 42px;
        }
        button:hover:not(:disabled) { border-color: var(--amber); background: rgba(255,140,0,0.1); }
        button:disabled { opacity: 0.15; border-color: #1a1a1a; }

        .cursor { display: inline-block; width: 8px; height: 1em; background: var(--amber); vertical-align: middle; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="header">
    <div class="header-title">DREAMCATCHER PROTOCOL - INITIAL INQUIRY</div>
    <div>SYNC: <span id="sync-val">0.0</span>%</div>
    <div style="text-align:center">CLEAN: 100%</div>
    <div style="text-align:right">STRESS: <span id="stress-val">0</span>%</div>
</div>

<div id="main-container">
    <div id="log-container">
        <div id="log-content"></div>
    </div>
</div>

<div id="controls">
    <div id="minimap-slot">
        <div id="minimap-container">
            <canvas id="minimap-canvas" width="125" height="125"></canvas>
        </div>
    </div>
    <div id="button-slot">
        <div id="dist-label">SCANNING UNCONSCIOUS... DIST: <span id="dist-val">000</span>M</div>
        <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
        <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
        <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
        <button id="opt4" onclick="handleOption(4)">[ BACK ]</button>
    </div>
</div>

<script>
    let playerPos = { x: 0, y: 0 }, scenarioData = [], mapData = [], history = [], totalDistance = 0, isTyping = false;
    let completedActions = {};

    async function init() {
        try {
            const v = Date.now();
            const [scRes, mapRes] = await Promise.all([fetch(`scenario.csv?v=${v}`), fetch(`map.csv?v=${v}`)]);
            scenarioData = parseCSV(await scRes.text());
            mapData = (await mapRes.text()).split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.split(',').map(cell => cell.trim()));
            mapData.forEach((row, y) => { row.forEach((tile, x) => { if (tile === 'S') { playerPos = { x, y }; history = [{...playerPos}]; } }); });
            updateState();
            requestAnimationFrame(renderLoop);
        } catch (e) { console.error("BOOT_SEQUENCE_FAILURE:", e); }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#'));
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const row = {}; let cells = [], current = '', inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
                else { current += char; }
            }
            cells.push(current.trim());
            headers.forEach((h, idx) => { row[h] = cells[idx] || ""; });
            return row;
        });
    }

    function updateState() {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (ev) {
            typeWriter(ev.Content, ev);
            document.getElementById('dist-val').innerText = String(totalDistance).padStart(3, '0');
        }
    }

    async function typeWriter(text, ev) {
        if (isTyping) return;
        isTyping = true;
        for(let i=1;i<=4;i++) document.getElementById(`opt${i}`).disabled = true;

        const logContent = document.getElementById('log-content');
        const box = document.createElement('div');
        
        // 다이브 모드 전용 박스 분류
        if (text.startsWith("[SYSTEM]")) box.className = 'msg-box sys-box';
        else if (text.startsWith("[NOISE]") || text.startsWith("[DATA]")) box.className = 'msg-box noise-box';
        else box.className = 'msg-box analyst-box';

        logContent.appendChild(box);
        const textSpan = document.createElement('span');
        box.appendChild(textSpan);
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        box.appendChild(cursor);

        for (let char of text) {
            textSpan.innerText += char;
            document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight;
            await new Promise(res => setTimeout(res, 25));
        }
        cursor.remove();
        isTyping = false;
        updateButtons(ev);
    }

    function updateButtons(ev) {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const isCompleted = completedActions[posStr];
        for (let i = 1; i <= 3; i++) {
            const btn = document.getElementById(`opt${i}`);
            const text = ev[`Opt${i}`], target = ev[`T${i}_Coord`];
            if (text) {
                if (target === posStr && isCompleted) { btn.innerText = "> [ COMPLETED ]"; btn.disabled = true; }
                else { btn.innerText = `> ${text}`; btn.disabled = false; }
            } else { btn.innerText = "[ --- ]"; btn.disabled = true; }
        }
        const last = history.length > 1;
        const btn4 = document.getElementById('opt4');
        btn4.innerText = ev.Opt4 || (last ? "> [ BACK ]" : "> [ START ]");
        btn4.disabled = !last && !ev.T4_Coord;
    }

    function handleOption(num) {
        if (isTyping) return;
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        let next = ev[`T${num}_Coord`];

        if (next === posStr) {
            completedActions[posStr] = true;
            updateButtons(ev);
            return;
        }
        if (num === 4 && !next && history.length > 1) {
            history.pop();
            playerPos = {...history[history.length-1]};
        } else if (next) {
            const p = next.split('-');
            playerPos = { x: Number(p[0]), y: Number(p[1]) };
            history.push({...playerPos});
        }
        totalDistance += 10;
        updateState();
    }

    function drawMinimap() {
        const ctx = document.getElementById('minimap-canvas').getContext('2d');
        const ts = 8, off = 8;
        ctx.clearRect(0, 0, 125, 125);
        mapData.forEach((row, y) => row.forEach((tile, x) => {
            if(tile !== '0') {
                ctx.fillStyle = (tile === '1' || tile === 'S') ? '#1a0d00' : 'var(--amber)';
                ctx.fillRect(x*ts+off, y*ts+off, ts-1, ts-1);
            }
        }));
        ctx.fillStyle = "#fff"; ctx.shadowBlur = 4; ctx.shadowColor = "#fff";
        ctx.fillRect(playerPos.x*ts+off, playerPos.y*ts+off, ts-1, ts-1);
        ctx.shadowBlur = 0;
    }

    function renderLoop() { drawMinimap(); requestAnimationFrame(renderLoop); }
    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER PROTOCOL v3.0.0</title>
    <style>
        /* 1. 디자인 코어 (스크린샷 기반 폰트/여백 세팅) */
        :root {
            --bg: #0b0500;
            --amber: #ff8c00;
            --amber-dim: #804600;
            --font-main: 'Courier New', Courier, monospace;
            --font-size-base: 14px;
            --font-size-header: 11px;
            --font-size-case: 18px;
            --line-height: 1.6;
        }

        /* [주석: 대체 컬러 옵션] 
           Cyan: #00FFFF / #004444
           PaperWhite: #E0E0D0 / #444433 
           CobaltBlue: #0055FF / #001144 
        */

        body {
            background-color: var(--bg);
            color: var(--amber);
            font-family: var(--font-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            transition: color 0.5s, background-color 0.5s;
        }

        /* 2. 레이아웃 구조 */
        #header {
            text-align: center; border-bottom: 1px solid var(--amber-dim);
            padding-bottom: 10px; margin-bottom: 10px;
        }
        .header-top { font-size: var(--font-size-header); letter-spacing: 2px; opacity: 0.7; }
        .case-title { font-size: var(--font-size-case); font-weight: bold; margin: 10px 0; }
        .status-row { display: flex; justify-content: space-around; font-size: 10px; }

        #main-container { display: flex; flex: 1; overflow: hidden; gap: 10px; }
        #log-container { flex: 3; overflow-y: auto; padding-right: 5px; }
        #side-container { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        /* 3. 박스 스타일링 (스크린샷 재현) */
        .msg-box {
            font-size: var(--font-size-base);
            line-height: var(--line-height);
            padding: 15px; margin-bottom: 15px;
            border: 1px solid var(--amber-dim);
            border-radius: 4px; position: relative;
            background: rgba(255, 255, 255, 0.02);
        }
        .sys-box { border-style: dashed; opacity: 0.8; } /* [SYSTEM] 전용 */
        .noise-box { border-color: #ff0033; background: rgba(255, 0, 51, 0.1); color: #ff0033; } /* [NOISE] 전용 */

        .cursor { display: inline-block; width: 8px; height: 16px; background: var(--amber); vertical-align: middle; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 4. 우측 미니맵 & 버튼 */
        #minimap { height: 120px; border: 1px solid var(--amber-dim); display: grid; font-size: 8px; text-align: center; }
        .cell { border: 0.1px solid rgba(128, 70, 0, 0.2); display: flex; align-items: center; justify-content: center; }
        .current-pos { background: var(--amber); color: #000; font-weight: bold; }

        #button-container { display: flex; flex-direction: column; gap: 5px; }
        .opt-btn {
            background: none; border: 1px solid var(--amber-dim); color: var(--amber);
            padding: 8px; font-size: 12px; cursor: pointer; text-align: left;
            transition: 0.2s;
        }
        .opt-btn:hover { background: var(--amber); color: #000; }
        .opt-btn:disabled { opacity: 0.3; cursor: default; }

    </style>
</head>
<body onclick="handleTouch()">

    <div id="header">
        <div class="header-top">DREAMCATCHER PROTOCOL - <span id="mode-title">INITIALIZING</span></div>
        <div class="case-title" id="case-name">CASE: UNKNOWN</div>
        <div class="status-row">
            <span>SYNC: <span id="sync-val">0.0</span>%</span>
            <span>CLEAN: 100%</span>
            <span>STRESS: 0%</span>
        </div>
    </div>

    <div id="main-container">
        <div id="log-container"></div>
        <div id="side-container">
            <div id="minimap"></div>
            <div id="button-container"></div>
        </div>
    </div>

    <script>
        let scenarioData = [], configData = [], mapData = [];
        let currentPoint = "S", isTyping = false, skipTyping = false;
        let currentMode = "";

        // CSV 파서 (공통)
        function parseCSV(text) {
            const lines = text.split('\n').filter(l => l.trim());
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] }), {});
            });
        }

        // 초기 시스템 부팅
        async function boot() {
            try {
                const [c, s, m] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text()),
                    fetch('map.csv').then(r => r.text())
                ]);
                configData = parseCSV(c);
                scenarioData = parseCSV(s);
                mapData = textToMap(m); // 기존 맵 파서 활용

                playPoint(currentPoint);
            } catch (e) {
                console.error("파일을 찾을 수 없습니다. config.csv, scenario.csv, map.csv를 확인하세요.");
            }
        }

        // 테마 적용 (Config 기반)
        function applyTheme(mode) {
            if (currentMode === mode) return;
            const cfg = configData.find(r => r.Mode === mode) || configData[0];
            const root = document.documentElement.style;
            root.setProperty('--amber', cfg.ThemeColor);
            root.setProperty('--amber-dim', cfg.DimColor);
            root.setProperty('--bg', cfg.BGColor || "#0b0500");
            document.getElementById('mode-title').innerText = cfg.Title;
            currentMode = mode;
        }

        // 터치 시 타자기 스킵
        function handleTouch() {
            if (isTyping) skipTyping = true;
        }

        async function playPoint(point) {
            currentPoint = point;
            const events = scenarioData.filter(r => r.POINT === point);
            const logBox = document.getElementById('log-container');
            
            // 기존 버튼 제거
            document.getElementById('button-container').innerHTML = '';

            for (let i = 0; i < events.length; i++) {
                const ev = events[i];
                if (ev.Mode) applyTheme(ev.Mode);
                
                const isLast = (i === events.length - 1);
                await typeWriter(ev.Content, logBox, isLast, ev.Content.startsWith('[SYSTEM]'), ev.Content.startsWith('[NOISE]'));
            }
            
            renderButtons(events[events.length - 1]);
            renderMinimap();
        }

        async function typeWriter(text, container, isLast, isSystem, isNoise) {
            isTyping = true; skipTyping = false;
            const div = document.createElement('div');
            div.className = `msg-box ${isSystem ? 'sys-box' : ''} ${isNoise ? 'noise-box' : ''}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;

            let charIdx = 0;
            while (charIdx < text.length) {
                if (skipTyping) { div.innerText = text; break; }
                div.innerText += text[charIdx++];
                await new Promise(r => setTimeout(r, 30));
            }

            if (isLast) {
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                div.appendChild(cursor);
            }
            isTyping = false;
        }

        function renderButtons(event) {
            const container = document.getElementById('button-container');
            for (let i = 1; i <= 4; i++) {
                const optText = event[`Opt${i}`];
                const target = event[`T${i}_Coord`];
                if (optText && optText !== "-") {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = optText;
                    btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
                    container.appendChild(btn);
                }
            }
        }

        // [이하 기존 미니맵 렌더링 및 맵 파서 로직 동일하게 유지]
        function textToMap(text) { return text.trim().split('\n').map(r => r.split(',')); }
        function renderMinimap() { /* 기존 로직 적용 */ }

        window.onload = boot;
    </script>
</body>
</html>

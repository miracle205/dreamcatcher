<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER - DIVE ENGINE</title>
    <style>
        :root { --main-orange: #FF8C00; --dim-orange: rgba(255, 140, 0, 0.1); --bg-black: #0a0a0a; }
        body { font-family: 'Courier New', Courier, monospace; background-color: var(--bg-black); color: var(--main-orange); margin: 0; padding: 0; display: flex; justify-content: center; height: 100dvh; overflow: hidden; cursor: pointer; }
        #game-container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; border-left: 1px solid var(--main-orange); border-right: 1px solid var(--main-orange); background: #111; position: relative; }
        
        /* 헤더 */
        .header { padding: 15px; border-bottom: 2px solid var(--main-orange); background: #1a0f00; flex-shrink: 0; }
        .dive-title { font-size: 1.1em; font-weight: 900; color: #fff; text-shadow: 0 0 8px var(--main-orange); }
        .status-row { display: flex; justify-content: space-between; font-size: 0.75em; margin-top: 10px; opacity: 0.9; }
        .status-val { color: #fff; font-weight: bold; }

        /* 채팅 로그 */
        #chat-log { flex: 1; background: #000; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 4px; font-size: 0.85em; line-height: 1.6; word-break: break-all; opacity: 0; transform: translateY(10px); animation: appear 0.3s forwards; }
        @keyframes appear { to { opacity: 1; transform: translateY(0); } }
        
        .msg.system { align-self: center; width: 95%; background: var(--dim-orange); border: 1px dashed var(--main-orange); text-align: center; }
        .msg.me { align-self: flex-end; border: 1px solid var(--main-orange); border-right-width: 4px; }
        .msg.subject { align-self: flex-start; background: var(--main-orange); color: #000; border-left-width: 4px; font-weight: bold; }

        /* 하단 안내 */
        .click-guide { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 0.6em; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body onclick="playNextLine()">

<div id="game-container">
    <div class="header">
        <div id="dive-id" class="dive-title">LOADING DIVE DATA...</div>
        <div class="status-row">
            <span>SYNC: <span id="sync-val" class="status-val">0.0%</span></span>
            <span>CLEAN: <span id="clean-val" class="status-val">100%</span></span>
            <span>STRESS: <span id="stress-val" class="status-val">0%</span></span>
        </div>
    </div>

    <div id="chat-log"></div>
    <div class="click-guide">CLICK TO CONTINUE / [SYSTEM STANDBY]</div>
</div>

<script>
    let scenarioData = [];
    let currentIndex = 0;
    let isTyping = false;

    // 1. CSV 파일 로드 및 파싱
    async function initEngine() {
        try {
            const response = await fetch('scenario.csv');
            const csvText = await response.text();
            const rows = csvText.split('\n').filter(row => row.trim() !== '');
            
            rows.forEach((row, index) => {
                const cols = row.split(',').map(c => c.trim());
                if (cols[0] === 'TITLE') {
                    document.getElementById('dive-id').innerText = cols[2]; // TITLE행의 Content를 제목으로
                } else if (index > 0) {
                    scenarioData.push({
                        type: cols[0],
                        sender: cols[1],
                        content: cols[2],
                        sync: cols[3] || 0,
                        clean: cols[4] || 100,
                        stress: cols[5] || 0
                    });
                }
            });
            
            // 엔진 초기 메시지
            console.log("DIVE ENGINE READY. TOTAL LINES:", scenarioData.length);
            playNextLine();
        } catch (e) {
            document.getElementById('dive-id').innerText = "ERROR: CSV NOT FOUND";
            console.error(e);
        }
    }

    // 2. 다음 줄 출력 실행
    async function playNextLine() {
        if (isTyping || currentIndex >= scenarioData.length) return;
        isTyping = true;

        const line = scenarioData[currentIndex];
        
        // 수치 업데이트
        document.getElementById('sync-val').innerText = line.sync + '%';
        document.getElementById('clean-val').innerText = line.clean + '%';
        document.getElementById('stress-val').innerText = line.stress + '%';

        // 로그 추가
        const log = document.getElementById('chat-log');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${line.type}`;
        
        let prefix = (line.sender && line.sender !== '-') ? `<strong>${line.sender}:</strong> ` : '';
        msgDiv.innerHTML = prefix + line.content;
        
        log.appendChild(msgDiv);
        log.scrollTop = log.scrollHeight;

        currentIndex++;
        setTimeout(() => { isTyping = false; }, 300); // 연속 클릭 방지
    }

    window.onload = initEngine;
</script>
</body>
</html>

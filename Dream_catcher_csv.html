<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIVE TERMINAL v2.6.3</title>
    <style>
        :root { --amber: #ff8c00; --amber-dim: #804600; --bg: #000; }
        body { background: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; text-transform: uppercase; }
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; z-index: 20; pointer-events: none; }
        
        #header { border-bottom: 2px solid var(--amber); padding: 10px; display: flex; justify-content: space-between; background: rgba(20, 10, 0, 0.8); z-index: 10; font-size: 0.8em; }
        
        #main-container { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        /* 로그 영역: 미니맵에 가려지지 않도록 패딩 조절 */
        #log-container { flex: 1; padding: 15px; overflow-y: auto; padding-bottom: 140px; }
        .log-entry { margin-bottom: 12px; line-height: 1.4; border-left: 2px solid var(--amber-dim); padding-left: 10px; font-size: 1.1em; }
        .feedback-entry { color: var(--amber); font-style: italic; opacity: 0.7; margin-bottom: 5px; font-size: 0.9em; }

        /* 미니맵: 우측 하단 버튼 위쪽으로 배치 */
        #minimap-container { 
            width: 110px; height: 110px; 
            border: 1px solid var(--amber-dim); 
            position: absolute; right: 10px; bottom: 10px; 
            background: rgba(0,0,0,0.85); z-index: 15; 
            pointer-events: none;
        }
        
        #controls { border-top: 2px solid var(--amber); padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #050505; z-index: 10; }
        button { background: none; border: 1px solid var(--amber-dim); color: var(--amber); padding: 12px 5px; cursor: pointer; font-family: inherit; font-size: 0.8em; text-align: center; }
        button:hover:not(:disabled) { background: var(--amber); color: var(--bg); }
        button:disabled { border-color: #222; color: #222; }
        
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div id="header">
    <div id="area-info">LOC: [<span id="area-name">INIT</span>]<br>STAT: <span id="area-desc">SCANNING</span></div>
    <div style="text-align:right">SYNC: <span id="sync-val">100</span>%<br>STRS: <span id="stress-val">0</span></div>
</div>
<div id="main-container">
    <div id="log-container"><div id="log-content"></div><span class="cursor">█</span></div>
    <div id="minimap-container"><canvas id="minimap-canvas" width="110" height="110"></canvas></div>
</div>
<div id="controls">
    <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
    <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
    <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
    <button id="opt4" onclick="handleOption(4)">[ RETURN ]</button>
</div>

<script>
    let playerPos = { x: 0, y: 0 }, history = [];
    let scenarioData = [], mapData = [];

    async function init() {
        try {
            const v = Date.now();
            const [scRes, mapRes] = await Promise.all([
                fetch(`scenario.csv?v=${v}`),
                fetch(`map.csv?v=${v}`)
            ]);
            scenarioData = parseCSV(await scRes.text());
            mapData = (await mapRes.text()).split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.split(',').map(cell => cell.trim()));

            mapData.forEach((row, y) => { row.forEach((tile, x) => { if (tile === 'S') { playerPos = { x, y }; history = [{...playerPos}]; } }); });
            updateState();
            requestAnimationFrame(renderLoop);
        } catch (e) { console.error(e); }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#'));
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const matches = [];
            const regex = /(".*?"|[^",\s]+)(?=\s*,|\s*$)/g;
            let match;
            while ((match = regex.exec(line)) !== null) {
                matches.push(match[0].replace(/^"|"$/g, '').trim());
            }
            return headers.reduce((obj, h, i) => { obj[h] = matches[i] || ""; return obj; }, {});
        });
    }

    function updateState() {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (ev) {
            const area = scenarioData.find(row => row.AreaID === ev.AreaID && !row.Coord);
            if (area) { 
                document.getElementById('area-name').innerText = area.AreaName; 
                document.getElementById('area-desc').innerText = area.AreaDesc; 
            }
            addLog(ev.Content);
            updateButtons(ev);
        }
    }

    function addLog(text) {
        const log = document.getElementById('log-content');
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerText = `> ${text}`;
        log.appendChild(div);
        const container = document.getElementById('log-container');
        container.scrollTop = container.scrollHeight;
    }

    function updateButtons(ev) {
        for (let i = 1; i <= 3; i++) {
            const btn = document.getElementById(`opt${i}`);
            btn.innerText = ev[`Opt${i}`] || "[ --- ]";
            btn.disabled = !ev[`Opt${i}`];
        }
        const last = history.length > 1 ? history[history.length-2] : history[0];
        document.getElementById('opt4').innerText = ev.Opt4 || `[ BACK: ${last.x}-${last.y} ]`;
    }

    function handleOption(num) {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (!ev && num !== 4) return;
        let nextCoord = (num === 4) ? null : ev[`T${num}_Coord`];
        if (num === 4) { if (history.length > 1) { history.pop(); playerPos = {...history[history.length-1]}; } }
        else if (nextCoord) { 
            const [tx, ty] = nextCoord.split('-').map(Number);
            playerPos = { x: tx, y: ty };
            history.push({...playerPos});
        }
        updateState();
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimap-canvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 6; const offset = 5;
        ctx.clearRect(0, 0, 110, 110);
        mapData.forEach((row, y) => {
            row.forEach((tile, x) => {
                ctx.fillStyle = (tile==='1'||tile==='S')?'#201000':tile==='P'?'#ff8c00':tile==='Q'?'#fff':tile==='G'?'#f00':tile==='N'?'#804600':'transparent';
                if(tile!=='0') ctx.fillRect(x*tileSize+offset, y*tileSize+offset, tileSize-1, tileSize-1);
            });
        });
        ctx.fillStyle = "#ff8c00"; ctx.fillRect(playerPos.x*tileSize+offset, playerPos.y*tileSize+offset, tileSize-1, tileSize-1);
    }

    function renderLoop() { drawMinimap(); requestAnimationFrame(renderLoop); }
    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DIVE TERMINAL v2.6</title>
    <style>
        :root { --amber: #ff8c00; --amber-dim: #804600; --bg: #000; }
        body { background: var(--bg); color: var(--amber); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; text-transform: uppercase; }
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; z-index: 10; pointer-events: none; }
        #header { border-bottom: 2px solid var(--amber); padding: 10px 20px; display: flex; justify-content: space-between; background: rgba(20, 10, 0, 0.5); }
        #main-container { display: flex; flex: 1; position: relative; }
        #log-container { flex: 1; padding: 20px; overflow-y: auto; border-right: 1px solid var(--amber-dim); }
        .log-entry { margin-bottom: 12px; line-height: 1.5; border-left: 2px solid var(--amber-dim); padding-left: 10px; }
        .feedback-entry { color: var(--amber); font-style: italic; opacity: 0.8; margin-bottom: 5px; }
        #minimap-container { width: 140px; height: 140px; border: 1px solid var(--amber-dim); margin: 15px; position: absolute; right: 0; top: 0; background: rgba(0,0,0,0.9); box-shadow: 0 0 10px var(--amber-dim); }
        #controls { border-top: 2px solid var(--amber); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #050505; }
        button { background: none; border: 1px solid var(--amber-dim); color: var(--amber); padding: 12px; cursor: pointer; font-family: inherit; text-align: left; transition: all 0.1s; font-size: 0.9em; }
        button:hover:not(:disabled) { background: var(--amber); color: var(--bg); box-shadow: 0 0 15px var(--amber); }
        button:disabled { border-color: #222; color: #222; cursor: default; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div id="header">
    <div id="area-info">LOC: [<span id="area-name">...</span>]<br>STAT: <span id="area-desc">...</span></div>
    <div>SYNC: <span id="sync-val">100</span>% | STRESS: <span id="stress-val">0</span></div>
</div>
<div id="main-container">
    <div id="log-container"><div id="log-content"></div><span class="cursor">█</span></div>
    <div id="minimap-container"><canvas id="minimap-canvas" width="140" height="140"></canvas></div>
</div>
<div id="controls">
    <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
    <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
    <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
    <button id="opt4" onclick="handleOption(4)">[ RETURN ]</button>
</div>

<script>
    let playerPos = { x: 1, y: 1 }, history = [];
    let scenarioData = [], mapData = [];

    async function init() {
        try {
            const v = Date.now(); // 깃허브 캐시 방지
            
            // 1. 데이터 병렬 로드
            const [scRes, mapRes] = await Promise.all([
                fetch(`scenario.csv?v=${v}`),
                fetch(`map.csv?v=${v}`)
            ]);

            if (!scRes.ok || !mapRes.ok) throw new Error("DATA_LOAD_ERROR");

            scenarioData = parseCSV(await scRes.text());
            mapData = (await mapRes.text()).split('\n')
                        .filter(l => l.trim() && !l.startsWith('#'))
                        .map(l => l.split(','));

            // 2. 시작 지점(S) 자동 스캔
            let startFound = false;
            mapData.forEach((row, y) => {
                row.forEach((tile, x) => {
                    if (tile.trim() === 'S') {
                        playerPos = { x: x, y: y };
                        history = [{ ...playerPos }];
                        startFound = true;
                    }
                });
            });

            if (!startFound) {
                console.warn("START_TOKEN 'S' NOT FOUND. DEFAULTING TO 1,1");
                playerPos = { x: 1, y: 1 };
                history = [{ ...playerPos }];
            }

            updateState();
            requestAnimationFrame(renderLoop);
        } catch (e) {
            console.error(e);
            addLog("CRITICAL_ERROR: SYSTEM RECOVERY FAILED. CHECK GITHUB REPO.");
        }
    }

    function parseCSV(text) {
        const lines = text.split('\n').filter(l => l.trim() && !l.startsWith('#'));
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const v = line.split(',');
            return headers.reduce((obj, h, i) => { 
                obj[h] = v[i] ? v[i].replace(/"/g, '').trim() : ""; 
                return obj; 
            }, {});
        });
    }

    function updateState() {
        const posStr = `${playerPos.x},${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr || row.Coord === `"${posStr}"`);
        
        if (ev) {
            // AreaID 기반으로 공간 설명 업데이트
            const area = scenarioData.find(row => row.AreaID === ev.AreaID && (!row.Coord || row.Coord === ""));
            if (area) { 
                document.getElementById('area-name').innerText = area.AreaName; 
                document.getElementById('area-desc').innerText = area.AreaDesc; 
            }
            addLog(ev.Content);
            updateButtons(ev);
        }
    }

    function addLog(text, isFeedback = false) {
        const log = document.getElementById('log-content');
        const div = document.createElement('div');
        div.className = isFeedback ? 'feedback-entry' : 'log-entry';
        div.innerText = isFeedback ? `>> ${text}` : `> ${text}`;
        log.appendChild(div);
        document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight;
    }

    function updateButtons(ev) {
        for (let i = 1; i <= 3; i++) {
            const btn = document.getElementById(`opt${i}`);
            btn.innerText = ev[`Opt${i}`] || "[ --- ]";
            btn.disabled = !ev[`Opt${i}`];
        }
        const opt4 = document.getElementById('opt4');
        const last = history.length > 1 ? history[history.length-2] : history[0];
        opt4.innerText = ev.Opt4 || `[ RETURN: ${last.x},${last.y} ]`;
    }

    function handleOption(num) {
        const posStr = `${playerPos.x},${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr || row.Coord === `"${posStr}"`);
        if (!ev) return;

        if (num < 4 && ev.Feedback) addLog(ev.Feedback, true);

        const next = ev[`T${num}_Coord`];
        if (num === 4 && !ev.Opt4) { 
            if (history.length > 1) history.pop(); 
            playerPos = history[history.length-1]; 
        } else if (next) { 
            const [tx, ty] = next.split(',').map(Number);
            playerPos = { x: tx, y: ty };
            history.push({ ...playerPos });
        }
        updateState();
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimap-canvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 12; ctx.clearRect(0, 0, 140, 140);
        
        mapData.forEach((row, y) => {
            row.forEach((tile, x) => {
                tile = tile.trim();
                // 색상 정의
                ctx.fillStyle = (tile==='1'||tile==='S')?'#201000':
                                tile==='P'?'#ff8c00':
                                tile==='Q'?'#fff':
                                tile==='G'?'#f00':
                                tile==='N'?'#804600':'transparent';
                
                if(tile!=='0') ctx.fillRect(x*tileSize+10, y*tileSize+10, tileSize-2, tileSize-2);
                
                // 파편 깜빡임 효과
                if(tile==='P') { 
                    ctx.globalAlpha = Math.sin(Date.now()/200)*0.5+0.5; 
                    ctx.fillRect(x*tileSize+10, y*tileSize+10, tileSize-2, tileSize-2); 
                    ctx.globalAlpha = 1.0; 
                }
            });
        });

        // 현재 플레이어 위치 (다이버)
        ctx.fillStyle = "#ff8c00"; 
        ctx.shadowBlur = 10; 
        ctx.shadowColor = "#ff8c00";
        ctx.fillRect(playerPos.x*tileSize+12, playerPos.y*tileSize+12, 6, 6);
        ctx.shadowBlur = 0;
    }

    function renderLoop() { 
        drawMinimap(); 
        requestAnimationFrame(renderLoop); 
    }

    window.onload = init;
</script>
</body>
</html>

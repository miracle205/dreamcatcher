<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIVE TERMINAL v2.6.4</title>
    <style>
        :root { --amber: #ff8c00; --amber-dim: #804600; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: var(--bg); color: var(--amber); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
        }

        body { 
            display: flex; flex-direction: column; 
            height: 100dvh; /* 최신 모바일 브라우저 대응 높이 */
            text-transform: uppercase; 
        }

        /* CRT Scanline */
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; z-index: 100; pointer-events: none; }

        #header { border-bottom: 2px solid var(--amber); padding: 8px 12px; background: rgba(10, 5, 0, 0.9); z-index: 50; display: flex; justify-content: space-between; font-size: 0.8em; flex-shrink: 0; }
        
        #main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        #log-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        #log-content { flex: 1; }
        .log-entry { margin-bottom: 12px; line-height: 1.5; border-left: 2px solid var(--amber-dim); padding-left: 10px; font-size: 1em; }
        
        /* 미니맵: 버튼 영역 바로 위에 고정 */
        #minimap-container { 
            width: 100px; height: 100px; 
            border: 1px solid var(--amber-dim); 
            position: absolute; right: 10px; bottom: 10px; 
            background: rgba(0,0,0,0.9); z-index: 40; 
        }
        
        /* 컨트롤 영역: 하단에 딱 붙도록 강제 고정 */
        #controls { 
            border-top: 2px solid var(--amber); 
            background: #0a0a0a; 
            padding: 10px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            z-index: 60; 
            flex-shrink: 0; /* 높이 줄어듦 방지 */
            height: 140px; /* 고정 높이 */
        }

        button { background: none; border: 1px solid var(--amber-dim); color: var(--amber); padding: 12px 5px; cursor: pointer; font-family: inherit; font-size: 0.85em; transition: 0.1s; display: block; width: 100%; height: 55px; }
        button:hover:not(:disabled) { background: var(--amber); color: var(--bg); }
        button:disabled { border-color: #222; color: #222; opacity: 0.3; }

        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div id="header">
    <div id="area-info">LOC: [<span id="area-name">INIT</span>]<br>STAT: <span id="area-desc">SCANNING</span></div>
    <div style="text-align:right">SYNC: <span id="sync-val">100</span>%<br>STRS: <span id="stress-val">0</span></div>
</div>
<div id="main-container">
    <div id="log-container"><div id="log-content"></div><span class="cursor" style="margin-bottom: 100px;">█</span></div>
    <div id="minimap-container"><canvas id="minimap-canvas" width="100" height="100"></canvas></div>
</div>
<div id="controls">
    <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
    <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
    <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
    <button id="opt4" onclick="handleOption(4)">[ BACK ]</button>
</div>

<script>
    let playerPos = { x: 0, y: 0 }, history = [];
    let scenarioData = [], mapData = [];

    async function init() {
        try {
            const v = Date.now();
            const [scRes, mapRes] = await Promise.all([
                fetch(`scenario.csv?v=${v}`),
                fetch(`map.csv?v=${v}`)
            ]);
            scenarioData = parseCSV(await scRes.text());
            const rawMap = await mapRes.text();
            mapData = rawMap.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.split(',').map(cell => cell.trim()));

            mapData.forEach((row, y) => { row.forEach((tile, x) => { if (tile === 'S') { playerPos = { x, y }; history = [{...playerPos}]; } }); });
            updateState();
            requestAnimationFrame(renderLoop);
        } catch (e) { console.error("INIT_ERROR:", e); }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#'));
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const matches = [];
            const regex = /(".*?"|[^",\s]+)(?=\s*,|\s*$)/g;
            let match;
            while ((match = regex.exec(line)) !== null) {
                matches.push(match[0].replace(/^"|"$/g, '').trim());
            }
            return headers.reduce((obj, h, i) => { obj[h] = matches[i] || ""; return obj; }, {});
        });
    }

    function updateState() {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (ev) {
            const area = scenarioData.find(row => row.AreaID === ev.AreaID && !row.Coord);
            if (area) { 
                document.getElementById('area-name').innerText = area.AreaName; 
                document.getElementById('area-desc').innerText = area.AreaDesc; 
            }
            addLog(ev.Content);
            updateButtons(ev);
        }
    }

    function addLog(text) {
        const log = document.getElementById('log-content');
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerText = `> ${text}`;
        log.appendChild(div);
        const container = document.getElementById('log-container');
        container.scrollTop = container.scrollHeight;
    }

    function updateButtons(ev) {
        for (let i = 1; i <= 3; i++) {
            const btn = document.getElementById(`opt${i}`);
            btn.innerText = ev[`Opt${i}`] || "[ --- ]";
            btn.disabled = !ev[`Opt${i}`];
        }
        const last = history.length > 1 ? history[history.length-2] : history[0];
        document.getElementById('opt4').innerText = ev.Opt4 || `[ BACK: ${last.x}-${last.y} ]`;
    }

    function handleOption(num) {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (!ev && num !== 4) return;
        let nextCoord = (num === 4) ? null : ev[`T${num}_Coord`];
        if (num === 4) { if (history.length > 1) { history.pop(); playerPos = {...history[history.length-1]}; } }
        else if (nextCoord) { 
            const parts = nextCoord.split('-');
            playerPos = { x: Number(parts[0]), y: Number(parts[1]) };
            history.push({...playerPos});
        }
        updateState();
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimap-canvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const tileSize = 5; const offset = 5;
        ctx.clearRect(0, 0, 100, 100);
        mapData.forEach((row, y) => {
            row.forEach((tile, x) => {
                ctx.fillStyle = (tile==='1'||tile==='S')?'#201000':tile==='P'?'#ff8c00':tile==='Q'?'#fff':tile==='G'?'#f00':tile==='N'?'#804600':'transparent';
                if(tile!=='0') ctx.fillRect(x*tileSize+offset, y*tileSize+offset, tileSize-1, tileSize-1);
            });
        });
        ctx.fillStyle = "#ff8c00"; ctx.fillRect(playerPos.x*tileSize+offset, playerPos.y*tileSize+offset, tileSize-1, tileSize-1);
    }

    function renderLoop() { drawMinimap(); requestAnimationFrame(renderLoop); }
    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER - ROOT RECOVERY</title>
    <style>
        :root {
            --main-orange: #FF8C00;
            --dim-orange: rgba(255, 140, 0, 0.15);
            --bg-black: #0a0a0a;
        }

        /* [초기 소스 공법] 100dvh와 flex-column으로 상하 절대 분리 */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: var(--bg-black); 
            color: var(--main-orange); 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; 
            height: 100dvh; overflow: hidden; 
        }

        #game-container { 
            width: 100%; max-width: 500px; height: 100%; 
            display: flex; flex-direction: column; 
            border-left: 1px solid var(--main-orange); 
            border-right: 1px solid var(--main-orange); 
            background: #111; position: relative; 
        }

        /* 헤더: 고정 (밀려나지 않음) */
        .header { 
            padding: 15px; border-bottom: 2px solid var(--main-orange); 
            background: #1a0f00; flex-shrink: 0; 
        }
        .protocol-line { font-size: 10px; letter-spacing: 2px; opacity: 0.8; }
        .case-line { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .status-row { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.8; }

        /* 로그 영역: 가변 (이 안에서만 스크롤) */
        #log-container { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            background: linear-gradient(to bottom, #111, #0a0a0a);
        }

        /* 하단 조작 패널: 고정 (flex-shrink: 0으로 절대 사수) */
        .control-panel { 
            border-top: 2px solid var(--main-orange); 
            background: #1a0f00; flex-shrink: 0;
            padding: 10px; box-sizing: border-box;
            height: 180px; /* 버튼 4개가 안전하게 들어가는 높이 */
        }

        /* [2단계 시공] 하단 좌우 분할 */
        .panel-layout { display: flex; gap: 10px; height: 100%; }
        
        #minimap-sector { 
            flex: 0 0 120px; border: 1px solid var(--main-orange);
            display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        #minimap { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        .cell { width: 12px; height: 12px; background: #222; }
        .cell.active { background: var(--main-orange); box-shadow: 0 0 5px var(--main-orange); }

        #action-sector { 
            flex: 1; display: flex; flex-direction: column; 
            gap: 5px; overflow-y: auto; 
        }

        /* 버튼 디자인 */
        .q-btn {
            width: 100%; padding: 10px; background: transparent;
            border: 1px solid var(--main-orange); color: var(--main-orange);
            text-align: left; font-family: inherit; font-size: 13px;
            cursor: pointer; font-weight: bold; flex-shrink: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .q-btn:hover:not(:disabled) { background: var(--main-orange); color: #000; }
        .q-btn:disabled { opacity: 0.2; cursor: default; }

        /* 메시지 박스 */
        .msg { max-width: 85%; padding: 10px; font-size: 14px; line-height: 1.5; word-break: keep-all; }
        .subject { align-self: flex-start; background: var(--main-orange); color: #000; border-radius: 10px 10px 10px 0; }
        .me { align-self: flex-end; border: 1px solid var(--main-orange); border-radius: 10px 10px 0 10px; }
        .system { align-self: center; width: 90%; text-align: center; font-size: 12px; background: var(--dim-orange); border: 1px dashed var(--main-orange); }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="game-container">
        <div class="header">
            <div id="ui-protocol" class="protocol-line">DREAMCATCHER PROTOCOL</div>
            <div id="ui-title" class="case-line">LOADING...</div>
            <div class="status-row">
                <span>SYNC: <span id="val-sync">100.0</span>%</span>
                <span>POINT: <span id="val-point">--</span></span>
            </div>
        </div>

        <div id="log-container"></div>

        <div class="control-panel">
            <div class="panel-layout">
                <div id="minimap-sector">
                    <div id="minimap"></div>
                </div>
                <div id="action-sector">
                    <button id="opt1" class="q-btn" disabled>[ --- ]</button>
                    <button id="opt2" class="q-btn" disabled>[ --- ]</button>
                    <button id="opt3" class="q-btn" disabled>[ --- ]</button>
                    <button id="opt4" class="q-btn" disabled>[ --- ]</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // [로직부는 v3.2.3의 안정된 파서와 초기화 순서를 유지합니다]
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", currentMode = "", syncValue = 100.0;
        let isTyping = false, shouldSkip = false;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);

                initMinimap();
                
                const titleRow = scenarioData.find(r => r.point === 'TITLE');
                if (titleRow) {
                    document.getElementById('ui-title').innerText = titleRow.Content;
                    if (titleRow.AreaID) applyTheme(titleRow.AreaID.trim());
                }

                playPoint(currentPoint);
            } catch (e) { console.error("BOOT_FAILED", e); }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                let values = []; let current = ''; let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                    else { current += char; }
                }
                values.push(current.trim());
                return headers.reduce((obj, h, i) => { obj[h] = values[i] || ""; return obj; }, {});
            });
        }

        async function applyTheme(modeId) {
            const cfg = configData.find(c => c.ID === modeId);
            if (!cfg) return;
            const r = document.documentElement.style;
            r.setProperty('--main-orange', cfg.ThemeColor);
            r.setProperty('--dim-orange', cfg.SubColor);
            document.getElementById('ui-protocol').innerText = `DREAMCATCHER PROTOCOL - ${cfg.AreaName}`;
            window.typeSpeed = parseInt(cfg.Speed) || 30;
        }

        async function playPoint(point) {
            if (isTyping) return;
            const events = scenarioData.filter(r => r.point === point && r.point !== 'TITLE');
            if (events.length === 0) return;
            
            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);

            for (const ev of events) {
                let text = ev.Content || "";
                let boxClass = "me"; 
                if (text.includes('[시스템]')) boxClass = 'system';
                else if (text.includes('지령실:')) boxClass = 'system'; // 스타일 변주 가능
                else if (text.includes('의뢰인:')) boxClass = 'subject';

                await typeWriter(text, boxClass);
            }
            updateButtons(events[events.length - 1]);
        }

        async function typeWriter(text, boxClass) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg ${boxClass}`;
            container.appendChild(div);
            
            for (let char of text) {
                if (shouldSkip) { div.innerText = text; break; }
                div.innerText += char;
                container.scrollTop = container.scrollHeight;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
            }
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function initMinimap() {
            const map = document.getElementById('minimap');
            for (let i = 0; i < 42; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const x = (i % 6) + 1; const y = Math.floor(i / 6) + 1;
                cell.id = `p-${x}-${y}`;
                map.appendChild(cell);
            }
        }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`p-${point}`);
            if (cell) cell.classList.add('active');
        }

        function updateButtons(ev) {
            setBtn(document.getElementById('opt1'), ev.Opt1, ev.T1_point);
            setBtn(document.getElementById('opt2'), ev.Opt2, ev.T2_point);
            setBtn(document.getElementById('opt3'), ev.Opt3, ev.T3_point);
            setBtn(document.getElementById('opt4'), ev.Opt4, ev.T4_point);
        }

        function setBtn(btn, label, target) {
            if (label && label !== "-") {
                btn.innerText = label; btn.disabled = false;
                btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
            } else { btn.innerText = "[ --- ]"; btn.disabled = true; }
        }

        window.onload = boot;
    </script>
</body>
</html>

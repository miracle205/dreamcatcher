<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v3.2.3</title>
    <style>
        :root {
            --theme: #FF8C00; 
            --sub: rgba(255, 140, 0, 0.15); 
            --bg: #0a0a0a;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg); color: var(--theme);
            font-family: var(--font-main); margin: 0; padding: 0;
            display: flex; justify-content: center; height: 100vh;
            overflow: hidden; box-sizing: border-box;
        }

        #game-container {
            width: 100%; max-width: 600px; height: 100%;
            display: flex; flex-direction: column;
            border-left: 1.5px solid var(--theme); border-right: 1.5px solid var(--theme);
            background: #0d0d0d;
        }

        #header {
            flex: 0 0 auto; padding: 12px 15px; border-bottom: 2px solid var(--theme);
            background: rgba(0, 0, 0, 0.9);
        }
        .protocol-line { font-size: 10px; letter-spacing: 1.5px; opacity: 0.8; font-weight: bold; }
        .case-line { font-size: 18px; font-weight: bold; text-transform: uppercase; margin: 4px 0; color: var(--theme); }
        .status-row { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.7; }

        #log-container { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 15px; padding: 20px; box-sizing: border-box;
        }

        /* 메시지 디자인 위계 */
        .msg-box { max-width: 85%; padding: 10px 14px; font-size: 14px; line-height: 1.5; position: relative; word-break: keep-all; white-space: pre-wrap; }
        .box-subject { align-self: flex-start; background: var(--theme); color: #000; font-weight: bold; border-radius: 12px 12px 12px 2px; }
        .box-me { align-self: flex-end; background: #000; color: var(--theme); border: 1.2px solid var(--theme); border-radius: 12px 12px 2px 12px; }
        .box-system { align-self: center; width: 90%; background: var(--sub); border: 1px dashed var(--theme); color: var(--theme); filter: brightness(1.3); font-size: 12px; text-align: center; }
        .box-cmd { align-self: flex-start; background: transparent; border: 1.5px dotted var(--theme); color: var(--theme); padding: 8px; border-radius: 4px; }
        .box-none { align-self: center; width: 100%; text-align: center; opacity: 0.8; font-style: italic; }

        /* [시공] 하단 높이 축소 (22vh) */
        #bottom-interface {
            flex: 0 0 22vh; display: flex; gap: 10px; padding: 10px;
            border-top: 2px solid var(--theme); background: #050505;
        }

        #minimap-sector { flex: 3.5; border: 1.2px solid var(--theme); display: flex; align-items: center; justify-content: center; background: #000; }
        #minimap { display: grid; gap: 2px; }
        .cell { width: 12px; height: 12px; background: #1a1a1a; }
        .cell.active { background: var(--theme); box-shadow: 0 0 8px var(--theme); }

        #action-sector { flex: 6.5; display: flex; flex-direction: column; gap: 4px; justify-content: space-between; }
        button {
            flex: 1; background: transparent; border: 1.2px solid var(--theme); 
            color: var(--theme); text-align: left; padding: 0 10px;
            font-family: inherit; font-size: 13px; cursor: pointer; font-weight: bold;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        button:hover:not(:disabled) { background: var(--theme); color: #000; }
        button:disabled { opacity: 0.1; }

        .cursor { display: inline-block; width: 8px; height: 14px; background: currentColor; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="game-container">
        <div id="header">
            <div id="ui-protocol" class="protocol-line">DREAMCATCHER PROTOCOL - LOADING...</div>
            <div id="ui-title" class="case-line">---------</div>
            <div class="status-row">
                <span>SYNC: <span id="val-sync">100.0</span>%</span>
                <span>POINT: <span id="val-point">--</span></span>
            </div>
        </div>

        <div id="log-container"></div>

        <div id="bottom-interface">
            <div id="minimap-sector"><div id="minimap"></div></div>
            <div id="action-sector">
                <button id="opt1" disabled>[ --- ]</button>
                <button id="opt2" disabled>[ --- ]</button>
                <button id="opt3" disabled>[ --- ]</button>
                <button id="opt4" disabled>[ --- ]</button>
            </div>
        </div>
    </div>

    <script>
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", currentMode = "", syncValue = 100.0;
        let isTyping = false, shouldSkip = false;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);

                initMinimap();
                
                // [시공] 타이틀 및 테마 초기화 로직 강화
                const titleRow = scenarioData.find(r => r.point === 'TITLE');
                if (titleRow) {
                    document.getElementById('ui-title').innerText = titleRow.Content;
                    if (titleRow.AreaID) applyTheme(titleRow.AreaID.trim());
                }

                playPoint(currentPoint);
            } catch (e) { console.error("BOOT_FAILED", e); }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                let values = []; let current = ''; let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                    else { current += char; }
                }
                values.push(current.trim());
                return headers.reduce((obj, h, i) => {
                    obj[h] = values[i] || "";
                    return obj;
                }, {});
            });
        }

        async function applyTheme(modeId) {
            if (currentMode === modeId) return;
            const cfg = configData.find(c => c.ID === modeId);
            if (!cfg) return;
            
            const r = document.documentElement.style;
            r.setProperty('--theme', cfg.ThemeColor);
            r.setProperty('--sub', cfg.SubColor);
            r.setProperty('--bg', cfg.BGColor);
            document.getElementById('ui-protocol').innerText = `DREAMCATCHER PROTOCOL - ${cfg.AreaName}`;
            window.typeSpeed = parseInt(cfg.Speed) || 30;
            currentMode = modeId;
        }

        async function playPoint(point) {
            if (isTyping) return;
            const events = scenarioData.filter(r => r.point === point && r.point !== 'TITLE');
            if (events.length === 0) return;
            
            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);

            for (const ev of events) {
                let text = ev.Content || "";
                let boxClass = "box-me"; 
                let isItalic = false;

                if (text.includes('[시스템]') || text.includes('[SYSTEM]')) boxClass = 'box-system';
                else if (text.includes('지령실:') || text.includes('본부:')) boxClass = 'box-cmd';
                else if (text.includes('의뢰인:') || text.includes('다이버:')) boxClass = text.includes('의뢰인:') ? 'box-subject' : 'box-me';
                else if (text.startsWith('(') || text.startsWith('<')) { boxClass = 'box-none'; isItalic = true; }

                await typeWriter(text, boxClass, isItalic);
                
                if (ev.Action && ev.Action.includes('SYNC')) {
                    const val = parseFloat(ev.Action.split('+')[1]) || 0;
                    syncValue += val;
                    document.getElementById('val-sync').innerText = syncValue.toFixed(1);
                }
            }
            updateButtons(events[events.length - 1]);
        }

        async function typeWriter(text, boxClass, isItalic) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${boxClass} ${isItalic ? 'italic' : ''}`;
            container.appendChild(div);
            
            const contentSpan = document.createElement('span');
            div.appendChild(contentSpan);
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            div.appendChild(cursor);

            for (let char of text) {
                if (shouldSkip) { contentSpan.innerText = text; break; }
                contentSpan.innerText += char;
                container.scrollTop = container.scrollHeight;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
            }
            cursor.remove();
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`p-${point}`);
            if (cell) cell.classList.add('active');
        }

        function updateButtons(ev) {
            setBtn(document.getElementById('opt1'), ev.Opt1, ev.T1_point);
            setBtn(document.getElementById('opt2'), ev.Opt2, ev.T2_point);
            setBtn(document.getElementById('opt3'), ev.Opt3, ev.T3_point);
            setBtn(document.getElementById('opt4'), ev.Opt4, ev.T4_point);
        }

        function setBtn(btn, label, target) {
            if (label && label.trim() && label !== "-") {
                btn.innerText = label.startsWith('>') ? label : `> ${label}`;
                btn.disabled = false;
                btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
            } else { btn.innerText = "[ --- ]"; btn.disabled = true; }
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(6, 1fr)`;
            for (let i = 0; i < 42; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const x = (i % 6) + 1; const y = Math.floor(i / 6) + 1;
                cell.id = `p-${x}-${y}`;
                map.appendChild(cell);
            }
        }

        window.onload = boot;
    </script>
</body>
</html>

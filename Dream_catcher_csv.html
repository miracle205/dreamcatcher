<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER STATION - DIVE MODE v1.8</title>
    <style>
        :root { 
            --main-orange: #FF8C00; 
            --bg-black: #000000; 
            --tile-size: 13px; 
            --font-main: 'Courier New', monospace;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: var(--font-main); 
            background: var(--bg-black); 
            color: var(--main-orange); 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100dvh; overflow: hidden; 
            touch-action: none;
            border: 2px solid var(--main-orange); 
        }

        /* --- 상단 상태 바 (이미지 기반 슬림 최적화) --- */
        header { 
            padding: 8px 15px; /* 수직 여백 최소화 */
            border-bottom: 1px solid var(--main-orange); 
            background: #000; flex-shrink: 0;
            text-align: center;
        }
        .protocol-title { 
            font-size: 0.55em; 
            opacity: 0.6; 
            letter-spacing: 1.5px; 
            margin-bottom: 4px; 
        }
        .case-title { 
            font-size: 1.0em; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 0 3px var(--main-orange); 
            margin-bottom: 8px; 
            letter-spacing: 0.5px;
        }
        .status-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            font-size: 0.65em; 
            border-top: 1px solid #221100; 
            padding-top: 6px;
            gap: 5px;
        }
        .stat-val { color: #fff; font-weight: bold; margin-left: 2px; }

        /* --- 로그 섹션 (이미지 말풍선 스타일) --- */
        #log-section { 
            flex: 1; overflow-y: auto; padding: 15px; 
            background: rgba(5,5,5,0.98); 
            border-bottom: 1px solid var(--main-orange);
            -webkit-overflow-scrolling: touch;
        }
        .msg { margin-bottom: 12px; font-size: 0.82em; line-height: 1.4; padding: 8px; word-break: break-all; }
        
        /* 시스템 메시지 스타일 */
        .msg.system { border: 1px dashed var(--main-orange); color: #888; text-align: center; background: #000; margin: 10px 0; }
        
        /* 캐릭터 대사 스타일 */
        .msg.me, .msg.subject { background: #220000; color: #fff; border: 1px solid #441111; border-radius: 2px; }
        .msg strong { color: var(--main-orange); font-size: 0.9em; }

        /* --- 하단 다이브 콘솔 (맵 & 조작부) --- */
        #dive-console { 
            height: 230px; /* 조작 편의성을 위해 높이 최적화 */
            display: flex; border-top: 1px solid var(--main-orange);
            background: #050505; flex-shrink: 0;
        }

        #map-section { 
            flex: 6; display: flex; justify-content: center; align-items: center; 
            border-right: 1px solid var(--main-orange); position: relative; overflow: hidden;
            background: #000;
        }
        #map-grid { display: grid; border: 1px solid #331a00; padding: 1px; background: #0a0a0a; }
        .tile { width: var(--tile-size); height: var(--tile-size); border: 0.1px solid #1a0d00; }
        .tile.wall { background: #111; }
        .tile.path { background: #1a0f00; }
        .tile.player { background: #fff; box-shadow: 0 0 8px #fff; border-radius: 50%; z-index: 5; position: relative; }
        .tile.clue { background: var(--main-orange); animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        #control-section { flex: 4; display: flex; justify-content: center; align-items: center; background: #080808; }
        #controls { display: grid; grid-template-columns: repeat(3, 48px); gap: 6px; }
        .btn { 
            width: 48px; height: 48px; 
            background: rgba(255,140,0,0.05); 
            border: 1px solid var(--main-orange); 
            color: var(--main-orange); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border-radius: 4px; font-size: 1.1em; 
            touch-action: manipulation; 
        }
        .btn:active { background: var(--main-orange); color: #000; }
    </style>
</head>
<body onclick="nextScenario()">

<header>
    <div class="protocol-title">DREAMCATCHER PROTOCOL - DIVE STATION</div>
    <div id="case-id" class="case-title">CASE: LOADING...</div>
    <div class="status-grid">
        <div>SYNC: <span id="sync-val" class="stat-val">0.0%</span></div>
        <div>CLEAN: <span id="clean-val" class="stat-val">100%</span></div>
        <div>STRESS: <span id="stress-val" class="stat-val">0%</span></div>
    </div>
</header>

<div id="log-section">
    </div>

<div id="dive-console" onclick="event.stopPropagation()">
    <div id="map-section">
        <div id="map-grid"></div>
    </div>
    <div id="control-section">
        <div id="controls">
            <div></div><div class="btn" onclick="move(0, -1)">▲</div><div></div>
            <div class="btn" onclick="move(-1, 0)">◀</div><div class="btn" onclick="move(0, 1)">▼</div><div class="btn" onclick="move(1, 0)">▶</div>
        </div>
    </div>
</div>

<script>
    let scenarioData = [];
    let mapData = [];
    let currentIdx = 0;
    let playerPos = { x: 0, y: 0 };
    let isTyping = false;
    let typingTimer;
    let lastTypingElement;
    let lastFullContent = "";

    async function init() {
        try {
            const [resSce, resMap] = await Promise.all([
                fetch('./scenario.csv'),
                fetch('./map.csv')
            ]);

            const sceText = await resSce.text();
            scenarioData = sceText.split('\n').filter(r => r.trim()).map(r => r.split(',').map(c => c.trim()));
            
            const titleRow = scenarioData.find(r => r[0] === 'TITLE');
            if(titleRow) document.getElementById('case-id').innerText = titleRow[2];

            const mapText = await resMap.text();
            const mapRows = mapText.split('\n').filter(r => r.trim());
            mapData = mapRows.slice(1).map(r => r.split(',').map(c => c.trim()));

            renderMap();
            addLog('system', '[SYSTEM] 무균실 동기화 완료. 다이빙을 시작합니다.');
        } catch (e) {
            addLog('system', 'ERROR: 데이터 연결 실패. CSV 파일명을 확인하세요.');
        }
    }

    function addLog(type, text) {
        const logSec = document.getElementById('log-section');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        
        if (type === 'system') {
            div.innerHTML = text;
            logSec.appendChild(div);
            logSec.scrollTop = logSec.scrollHeight;
        } else {
            logSec.appendChild(div);
            lastTypingElement = div;
            lastFullContent = text;
            runTypewriter(div, text);
        }
    }

    function runTypewriter(container, text) {
        isTyping = true;
        let charIdx = 0;
        const logSec = document.getElementById('log-section');
        container.innerHTML = ""; 

        function type() {
            if (charIdx < text.length) {
                if (text.substr(charIdx, 8) === "<strong>") {
                    const endTagIdx = text.indexOf("</strong>", charIdx) + 9;
                    container.innerHTML += text.substring(charIdx, endTagIdx);
                    charIdx = endTagIdx;
                } else {
                    container.innerHTML += text.charAt(charIdx);
                    charIdx++;
                }
                logSec.scrollTop = logSec.scrollHeight;
                typingTimer = setTimeout(type, 25); // 타자기 속도 소폭 상향
            } else {
                isTyping = false;
            }
        }
        type();
    }

    function completeImmediately() {
        clearTimeout(typingTimer);
        if (lastTypingElement) lastTypingElement.innerHTML = lastFullContent;
        isTyping = false;
        document.getElementById('log-section').scrollTop = document.getElementById('log-section').scrollHeight;
    }

    function renderMap() {
        const grid = document.getElementById('map-grid');
        if (!mapData.length) return;
        grid.style.gridTemplateColumns = `repeat(${mapData[0].length}, var(--tile-size))`;
        grid.innerHTML = '';

        for (let y = 0; y < mapData.length; y++) {
            for (let x = 0; x < mapData[y].length; x++) {
                const tile = document.createElement('div');
                tile.id = `tile-${x}-${y}`;
                tile.className = 'tile ' + (mapData[y][x] === '0' ? 'wall' : mapData[y][x] === '1' ? 'path' : mapData[y][x] === 'E' || mapData[y][x] === 'C' ? 'clue' : '');
                if (mapData[y][x] === 'P') { tile.classList.add('player'); playerPos = { x, y }; }
                grid.appendChild(tile);
            }
        }
    }

    function nextScenario() {
        if (isTyping) { completeImmediately(); return; }

        const lines = scenarioData.filter(r => r[0] !== 'TITLE' && r[0] !== 'Type');
        if (currentIdx >= lines.length) return;

        const [type, sender, content, sync, clean, stress] = lines[currentIdx];
        
        if (sync && sync !== '-') document.getElementById('sync-val').innerText = sync + '%';
        if (clean && clean !== '-') document.getElementById('clean-val').innerText = clean + '%';
        if (stress && stress !== '-') document.getElementById('stress-val').innerText = stress + '%';

        addLog(type, `<strong>${sender}:</strong> ${content}`);
        currentIdx++;
    }

    function move(dx, dy) {
        const nx = playerPos.x + dx, ny = playerPos.y + dy;
        if (ny >= 0 && ny < mapData.length && nx >= 0 && nx < mapData[0].length && mapData[ny][nx] !== '0') {
            document.getElementById(`tile-${playerPos.x}-${playerPos.y}`).classList.remove('player');
            playerPos = { x: nx, y: ny };
            document.getElementById(`tile-${playerPos.x}-${playerPos.y}`).classList.add('player');
            
            if (mapData[ny][nx] === 'E') addLog('system', '[DETECTED] 기억의 파편을 인양했습니다.');
            if (mapData[ny][nx] === 'C') addLog('system', '[CRITICAL] 코어 데이터 전송 시작!');
        }
    }

    window.onload = init;
</script>
</body>
</html>

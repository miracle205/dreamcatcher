<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER PROTOCOL v3.0.1</title>
    <style>
        :root {
            --theme: #FF8C00;
            --sub: #804600;
            --bg: #0B0500;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--theme);
            font-family: var(--font-main);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* --- 1. 상단 레이아웃 (수치 및 타이틀) --- */
        #header {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid var(--sub);
            padding-bottom: 8px; margin-bottom: 10px;
        }
        .title-group { display: flex; flex-direction: column; }
        .mode-id { font-size: 10px; opacity: 0.6; letter-spacing: 2px; }
        .case-title { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
        .status-group { text-align: right; font-size: 12px; line-height: 1.4; }

        /* --- 2. 중앙 레이아웃 (로그창) --- */
        #log-container {
            flex: 1; overflow-y: auto;
            margin-bottom: 15px; padding-right: 10px;
            scrollbar-width: thin; scrollbar-color: var(--sub) transparent;
        }
        #log-container::-webkit-scrollbar { width: 4px; }
        #log-container::-webkit-scrollbar-thumb { background: var(--sub); }

        .msg-box { margin-bottom: 12px; line-height: 1.6; font-size: 15px; word-break: keep-all; }
        .sys-msg { color: #fff; opacity: 0.9; }
        .cursor { display: inline-block; width: 8px; height: 15px; background: var(--theme); animation: blink 1s infinite; margin-left: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- 3. 하단 레이아웃 (맵 & 버튼) --- */
        #bottom-interface {
            display: flex; height: 160px; gap: 15px;
            border-top: 1px solid var(--sub); padding-top: 15px;
        }

        /* 가변 미니맵 (6x7) */
        #minimap-sector {
            flex: 0 0 140px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--sub); background: rgba(0,0,0,0.2);
        }
        #minimap {
            display: grid; gap: 2px;
        }
        .cell { width: 16px; height: 16px; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.05); }
        .cell.active { background: var(--theme); box-shadow: 0 0 10px var(--theme); border: none; }

        /* 액션 버튼 */
        #action-sector { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .opt-btn {
            background: none; border: 1px solid var(--sub); color: var(--theme);
            padding: 10px 15px; text-align: left; cursor: pointer;
            font-family: var(--font-main); font-size: 14px; transition: 0.2s;
            position: relative;
        }
        .opt-btn:hover { background: var(--theme); color: var(--bg); border-color: var(--theme); }
        .opt-btn::before { content: "[ "; }
        .opt-btn::after { content: " ]"; float: right; }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="header">
        <div class="title-group">
            <span id="ui-mode" class="mode-id">INITIALIZING...</span>
            <span id="ui-title" class="case-title">CASE: Dive 01</span>
        </div>
        <div class="status-group">
            <div>SYNC: <span id="val-sync">100.0</span>%</div>
            <div>POINT: <span id="val-point">--</span></div>
        </div>
    </div>

    <div id="log-container"></div>

    <div id="bottom-interface">
        <div id="minimap-sector">
            <div id="minimap"></div>
        </div>
        <div id="action-sector"></div>
    </div>

    <script>
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", syncValue = 100.0, currentMode = "";
        let isTyping = false, shouldSkip = false;
        
        // 가변 맵 설정 (6x7)
        const MAP_W = 6, MAP_H = 7;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);
                
                initMinimap();
                playPoint(currentPoint);
            } catch (e) {
                document.getElementById('log-container').innerText = "FATAL: 로컬 서버에서 CSV 파일을 로드할 수 없습니다.";
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] }), {});
            });
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(${MAP_W}, 1fr)`;
            map.innerHTML = '';
            for (let y = 1; y <= MAP_H; y++) {
                for (let x = 1; x <= MAP_W; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `p-${x}-${y}`;
                    map.appendChild(cell);
                }
            }
        }

        async function playPoint(point) {
            const events = scenarioData.filter(r => r.point === point);
            if (events.length === 0) return;

            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);

            const btnContainer = document.getElementById('action-sector');
            btnContainer.innerHTML = ''; // 버튼 초기화

            for (const ev of events) {
                if (ev.Mode) applyTheme(ev.Mode);
                await typeWriter(ev.Content, ev.Content.startsWith('['));
                
                // Action 처리
                if (ev.Action && ev.Action.includes('SYNC+')) {
                    syncValue += parseInt(ev.Action.split('+')[1]);
                    document.getElementById('val-sync').innerText = syncValue.toFixed(1);
                }
            }
            renderButtons(events[events.length - 1]);
        }

        function applyTheme(modeId) {
            if (currentMode === modeId) return;
            const cfg = configData.find(c => c.ID === modeId);
            if (cfg) {
                const r = document.documentElement.style;
                r.setProperty('--theme', cfg.ThemeColor);
                r.setProperty('--sub', cfg.SubColor);
                r.setProperty('--bg', cfg.BGColor);
                document.getElementById('ui-mode').innerText = cfg.ID;
                document.getElementById('ui-title').innerText = cfg.Title;
                window.typeSpeed = parseInt(cfg.Speed) || 30;
                currentMode = modeId;
            }
        }

        async function typeWriter(text, isSystem) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${isSystem ? 'sys-msg' : ''}`;
            container.appendChild(div);

            for (let char of text) {
                if (shouldSkip) { div.innerText = text; break; }
                div.innerText += char;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
                container.scrollTop = container.scrollHeight;
            }
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const activeCell = document.getElementById(`p-${point}`);
            if (activeCell) activeCell.classList.add('active');
        }

        function renderButtons(event) {
            const container = document.getElementById('action-sector');
            for (let i = 1; i <= 4; i++) {
                const label = event[`Opt${i}`];
                const target = event[`T${i}_point`];
                if (label && label !== "-") {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = label;
                    btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
                    container.appendChild(btn);
                }
            }
        }

        window.onload = boot;
    </script>
</body>
</html>

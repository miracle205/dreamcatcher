<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v3.2.3 - THE FINAL SOUL</title>
    <style>
        :root {
            --theme: #FF8C00; 
            --sub: rgba(255, 140, 0, 0.15); 
            --bg: #0a0a0a;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg); color: var(--theme);
            font-family: var(--font-main); margin: 0; padding: 0;
            display: flex; justify-content: center; height: 100vh;
            box-sizing: border-box; overflow: hidden;
        }

        #game-container {
            width: 100%; max-width: 600px; height: 100%;
            display: flex; flex-direction: column;
            border-left: 1.5px solid var(--theme); border-right: 1.5px solid var(--theme);
            background: #0d0d0d; position: relative;
        }

        #header {
            flex: 0 0 auto; padding: 12px 15px; border-bottom: 2px solid var(--theme);
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; gap: 4px;
        }
        .protocol-line { font-size: 10px; letter-spacing: 2px; opacity: 0.8; font-weight: bold; }
        .case-line { font-size: 18px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .status-row { display: flex; justify-content: space-between; font-size: 11px; margin-top: 3px; opacity: 0.7; }

        #log-container { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 18px; padding: 25px; box-sizing: border-box;
        }

        /* --- 디자인 위계 고정 --- */
        .msg-box { 
            max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.6;
            position: relative; animation: slideUp 0.3s ease-out forwards;
            word-break: keep-all; white-space: pre-wrap;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .box-subject { 
            align-self: flex-start; background: var(--theme); color: #000 !important;
            font-weight: bold; border-radius: 15px 15px 15px 2px;
        }

        .box-me { 
            align-self: flex-end; background: #000; color: var(--theme);
            border: 1.5px solid var(--theme); border-radius: 15px 15px 2px 15px;
        }

        .box-system { 
            align-self: center; width: 95%; background: var(--sub); 
            border: 1px dashed var(--theme); color: var(--theme); 
            filter: brightness(1.5); font-size: 12.5px; text-align: center;
        }

        .box-cmd { 
            align-self: flex-start; background: transparent; 
            border: 2px dotted var(--theme); color: var(--theme); border-radius: 4px;
        }

        .box-none { align-self: center; width: 100%; text-align: center; color: var(--theme); opacity: 0.8; }
        .italic { font-style: italic; }

        .cursor { display: inline-block; width: 10px; height: 16px; background: currentColor; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- 하단 버튼 레이아웃 고정 (수정됨) --- */
        #bottom-interface {
            flex: 0 0 35%; display: flex; gap: 10px; padding: 12px;
            border-top: 2px solid var(--theme); background: #050505;
            box-sizing: border-box;
        }

        #minimap-sector { flex: 4; border: 1.5px solid var(--theme); background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #minimap { display: grid; gap: 2px; }
        .cell { width: 16px; height: 16px; background: #1a1a1a; }
        .cell.active { background: var(--theme); box-shadow: 0 0 8px var(--theme); }

        #action-sector { 
            flex: 6; display: grid; grid-template-rows: repeat(4, 1fr); gap: 5px; 
            height: 100%; box-sizing: border-box;
        }
        button {
            width: 100%; height: 100%; background: transparent; border: 1.2px solid var(--theme); 
            color: var(--theme); text-align: left; padding: 0 12px;
            font-family: inherit; font-size: 13px; cursor: pointer;
            transition: all 0.2s; font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        button:hover:not(:disabled) { background: var(--theme); color: #000; }
        button:disabled { opacity: 0.15; cursor: default; }

        #log-container::-webkit-scrollbar { width: 3px; }
        #log-container::-webkit-scrollbar-thumb { background: var(--theme); }
    </style>
</head>
<body onclick="skipTypewriter()">

    <div id="game-container">
        <div id="header">
            <div id="ui-protocol" class="protocol-line">DREAMCATCHER SYSTEM</div>
            <div id="ui-title" class="case-line">INITIALIZING...</div>
            <div class="status-row">
                <span>SYNC: <span id="val-sync">100.0</span>%</span>
                <span>POINT: <span id="val-point">--</span></span>
            </div>
        </div>

        <div id="log-container"></div>

        <div id="bottom-interface">
            <div id="minimap-sector"><div id="minimap"></div></div>
            <div id="action-sector">
                <button id="opt1">[ --- ]</button>
                <button id="opt2">[ --- ]</button>
                <button id="opt3">[ --- ]</button>
                <button id="opt4">[ --- ]</button>
            </div>
        </div>
    </div>

    <script>
        let scenarioData = [], configData = [];
        let currentPoint = "1-1", currentMode = "", syncValue = 100.0;
        let isTyping = false, shouldSkip = false;

        async function boot() {
            try {
                const [cRes, sRes] = await Promise.all([
                    fetch('config.csv').then(r => r.text()),
                    fetch('scenario.csv').then(r => r.text())
                ]);
                configData = parseCSV(cRes);
                scenarioData = parseCSV(sRes);
                initMinimap();
                applyTitleConfig();
                playPoint(currentPoint);
            } catch (e) { console.error("BOOT_ERROR"); }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const headers = lines[0].replace('#', '').split(',').map(h => h.trim());
            return lines.slice(1).filter(line => line.trim()).map(line => {
                let values = []; let current = ''; let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                        else { inQuotes = !inQuotes; }
                    } else if (char === ',' && !inQuotes) { values.push(current); current = ''; }
                    else { current += char; }
                }
                values.push(current);
                return headers.reduce((obj, h, i) => {
                    obj[h] = values[i] ? values[i].trim() : "";
                    return obj;
                }, {});
            });
        }

        async function playPoint(point) {
            if (isTyping) return;
            const events = scenarioData.filter(r => r.point === point && r.point !== 'TITLE');
            if (events.length === 0) return;
            
            currentPoint = point;
            document.getElementById('val-point').innerText = point;
            updateMinimap(point);

            for (const ev of events) {
                let raw = ev.Content || "";
                let text = raw;
                let boxClass = "box-me"; 
                let isItalic = false;

                // [수정] 경고[!] 포함 시스템 판별 보강
                if (raw.includes('[시스템]') || raw.includes('[SYSTEM]') || raw.includes('[!]')) {
                    boxClass = 'box-system';
                } else if (raw.includes('지령실:') || raw.includes('본부:')) {
                    boxClass = 'box-cmd';
                } else if (raw.includes('의뢰인:') || raw.includes('대상자:') || raw.includes('박사님,')) {
                    boxClass = 'box-subject';
                } else if (raw.startsWith('(독백)') || (raw.startsWith('(') && raw.endsWith(')'))) {
                    boxClass = 'box-none'; isItalic = true;
                    text = raw.replace(/^\(독백\)\s*/, "").replace(/^\(|\)$/g, "").trim();
                } else if (raw.startsWith('(묘사)') || (raw.startsWith('<') && raw.endsWith('>'))) {
                    boxClass = 'box-none';
                    text = raw.replace(/^\(묘사\)\s*/, "").replace(/^<|>$/g, "").trim();
                }

                await typeWriter(text, boxClass, isItalic);
                
                if (ev.Action && ev.Action.includes('SYNC+')) {
                    syncValue += parseFloat(ev.Action.split('+')[1]);
                    document.getElementById('val-sync').innerText = syncValue.toFixed(1);
                }
            }
            updateButtons(events[events.length - 1]);
        }

        async function typeWriter(text, boxClass, isItalic) {
            isTyping = true; shouldSkip = false;
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `msg-box ${boxClass} ${isItalic ? 'italic' : ''}`;
            container.appendChild(div);

            const contentSpan = document.createElement('span');
            div.appendChild(contentSpan);
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            div.appendChild(cursor);

            for (let char of text) {
                if (shouldSkip) { contentSpan.innerText = text; break; }
                contentSpan.innerText += char;
                container.scrollTop = container.scrollHeight;
                await new Promise(r => setTimeout(r, window.typeSpeed || 30));
            }
            cursor.remove();
            isTyping = false;
        }

        function skipTypewriter() { if (isTyping) shouldSkip = true; }

        function updateMinimap(point) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            const cell = document.getElementById(`p-${point}`);
            if (cell) cell.classList.add('active');
        }

        function updateButtons(ev) {
            setBtn(document.getElementById('opt1'), ev.Opt1, ev.T1_point);
            setBtn(document.getElementById('opt2'), ev.Opt2, ev.T2_point);
            setBtn(document.getElementById('opt3'), ev.Opt3, ev.T3_point);
            setBtn(document.getElementById('opt4'), ev.Opt4, ev.T4_point);
        }

        function setBtn(btn, label, target) {
            btn.onclick = null; // 초기화
            if (label && label !== "-" && label !== "" && label !== " ") {
                btn.innerText = label.startsWith('>') ? label : `> ${label}`;
                btn.disabled = false;
                btn.onclick = (e) => { e.stopPropagation(); playPoint(target); };
            } else { 
                btn.innerText = "[ --- ]"; 
                btn.disabled = true; 
            }
        }

        function applyTitleConfig() {
            const row = scenarioData.find(r => r.point === 'TITLE');
            if (row) {
                document.getElementById('ui-title').innerText = row.Content;
                if (row.AreaID) applyTheme(row.AreaID);
            }
        }

        function applyTheme(modeId) {
            const cfg = configData.find(c => c.ID === modeId);
            if (!cfg) return;
            const r = document.documentElement.style;
            r.setProperty('--theme', cfg.ThemeColor);
            r.setProperty('--sub', cfg.SubColor);
            r.setProperty('--bg', cfg.BGColor);
            document.getElementById('ui-protocol').innerText = `PROTOCOL: ${cfg.AreaName}`;
            window.typeSpeed = parseInt(cfg.Speed) || 30;
            currentMode = modeId;
        }

        function initMinimap() {
            const map = document.getElementById('minimap');
            map.style.gridTemplateColumns = `repeat(6, 1fr)`;
            for (let i = 0; i < 42; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const x = (i % 6) + 1; const y = Math.floor(i / 6) + 1;
                cell.id = `p-${x}-${y}`;
                map.appendChild(cell);
            }
        }

        window.onload = boot;
    </script>
</body>
</html>

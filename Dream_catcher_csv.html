<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER v2.7.6</title>
    <style>
        :root { --amber: #ff8c00; --amber-dim: #804600; --bg: #000; --green: #00ff00; --red: #ff0000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background: var(--bg); color: var(--amber); 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
        }

        body { display: flex; flex-direction: column; height: 100dvh; text-transform: uppercase; }

        /* CRT Scanline Effect */
        body::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 4px, 3px 100%; z-index: 100; pointer-events: none; }

        /* [TOP] Header Zone */
        #header { border-bottom: 2px solid var(--amber); padding: 8px 12px; background: rgba(10, 5, 0, 0.9); z-index: 50; display: flex; justify-content: space-between; font-size: 0.85em; flex-shrink: 0; }
        
        /* [MIDDLE] Log Window Zone */
        #main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #log-container { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        #log-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        
        .log-entry { margin-bottom: 12px; line-height: 1.5; font-size: 1.1em; text-align: center; }
        .feedback-entry { color: var(--amber); font-style: italic; opacity: 0.7; margin-bottom: 8px; font-size: 0.9em; text-align: center; }

        /* [BOTTOM] Control Zone */
        #controls { height: 210px; border-top: 2px solid var(--amber); background: #080808; display: flex; flex-shrink: 0; z-index: 60; }
        #minimap-slot { width: 140px; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--amber-dim); background: #000; }
        #minimap-container { width: 120px; height: 120px; border: 1px solid #222; }

        #button-slot { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 12px; padding-top: 35px; position: relative; overflow-y: auto; }
        #distance-counter { position: absolute; top: 8px; left: 12px; font-size: 0.85em; color: var(--amber-dim); letter-spacing: 1px; }

        button { background: none; border: 1px solid var(--amber-dim); color: var(--amber); padding: 10px; cursor: pointer; font-family: inherit; font-size: 1.0em; text-align: center; transition: 0.1s; width: 100%; min-height: 42px; font-weight: normal; }
        button:hover:not(:disabled) { background: var(--amber-dim); color: #fff; }
        button:disabled { border-color: #222; color: #222; opacity: 0.2; }
        #opt4 { border-color: #402000; color: #805000; }

        /* Cursor */
        .cursor { display: inline-block; width: 8px; height: 1.1em; background: var(--amber); vertical-align: middle; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div id="header">
    <div id="area-info">LOC: [<span id="area-name">INIT</span>]<br>STAT: <span id="area-desc">SCANNING</span></div>
    <div style="text-align:right">SYNC: <span id="sync-val">100</span>%<br>STRS: <span id="stress-val">0</span></div>
</div>
<div id="main-container">
    <div id="log-container"><div id="log-content"></div></div>
</div>
<div id="controls">
    <div id="minimap-slot"><div id="minimap-container"><canvas id="minimap-canvas" width="120" height="120"></canvas></div></div>
    <div id="button-slot">
        <div id="distance-counter">DIST: <span id="dist-val">000</span>M</div>
        <button id="opt1" onclick="handleOption(1)">[ --- ]</button>
        <button id="opt2" onclick="handleOption(2)">[ --- ]</button>
        <button id="opt3" onclick="handleOption(3)">[ --- ]</button>
        <button id="opt4" onclick="handleOption(4)">[ BACK ]</button>
    </div>
</div>

<script>
    let playerPos = { x: 0, y: 0 }, history = [];
    let scenarioData = [], mapData = [];
    let completedActions = {}, totalDistance = 0;

    async function init() {
        try {
            const v = Date.now();
            const [scRes, mapRes] = await Promise.all([
                fetch(`scenario.csv?v=${v}`), fetch(`map.csv?v=${v}`)
            ]);
            scenarioData = parseCSV(await scRes.text());
            mapData = (await mapRes.text()).split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#')).map(l => l.split(',').map(cell => cell.trim()));
            mapData.forEach((row, y) => { row.forEach((tile, x) => { if (tile === 'S') { playerPos = { x, y }; history = [{...playerPos}]; } }); });
            updateState();
            requestAnimationFrame(renderLoop);
        } catch (e) { console.error("INIT_ERROR:", e); }
    }

    // 데이터 꼬임 방지: RFC 4180 규격을 따르는 CSV 파서
    function parseCSV(text) {
        const result = [];
        const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.startsWith('#'));
        if (lines.length === 0) return [];
        const headers = lines[0].split(',').map(h => h.trim());

        for (let i = 1; i < lines.length; i++) {
            const row = {};
            const line = lines[i];
            let cells = [], current = '', inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { cells.push(current.trim()); current = ''; }
                else { current += char; }
            }
            cells.push(current.trim());
            headers.forEach((h, idx) => { row[h] = cells[idx] || ""; });
            result.push(row);
        }
        return result;
    }

    function updateState() {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (ev) {
            const area = scenarioData.find(row => row.AreaID === ev.AreaID && !row.Coord);
            if (area) { 
                document.getElementById('area-name').innerText = area.AreaName; 
                document.getElementById('area-desc').innerText = area.AreaDesc; 
            }
            addLog(ev.Content);
            updateButtons(ev);
            document.getElementById('dist-val').innerText = String(totalDistance).padStart(3, '0');
        }
    }

    function addLog(text, isFeedback = false) {
        if(!text) return;
        const logContent = document.getElementById('log-content');
        const oldCursor = document.querySelector('.cursor');
        if (oldCursor) oldCursor.remove();
        const div = document.createElement('div');
        div.className = isFeedback ? 'feedback-entry' : 'log-entry';
        div.innerText = text;
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        div.appendChild(cursor);
        logContent.appendChild(div);
        document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight;
    }

    function updateButtons(ev) {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const isCompleted = completedActions[posStr];
        for (let i = 1; i <= 3; i++) {
            const btn = document.getElementById(`opt${i}`);
            const text = ev[`Opt${i}`], target = ev[`T${i}_Coord`];
            if (text && text !== "") {
                if (target === posStr && isCompleted) { btn.innerText = "[ COMPLETED ]"; btn.disabled = true; }
                else { btn.innerText = text; btn.disabled = false; }
            } else { btn.innerText = "[ --- ]"; btn.disabled = true; }
        }
        const last = history.length > 1 ? history[history.length-2] : null;
        const btn4 = document.getElementById('opt4');
        if (last) { btn4.innerText = ev.Opt4 || `[ BACK: ${last.x}-${last.y} ]`; btn4.disabled = false; }
        else { btn4.innerText = "[ START ]"; btn4.disabled = true; }
    }

    function handleOption(num) {
        const posStr = `${playerPos.x}-${playerPos.y}`;
        const ev = scenarioData.find(row => row.Coord === posStr);
        if (!ev && num !== 4) return;
        let nextCoord = (num === 4) ? null : ev[`T${num}_Coord`];

        if (nextCoord === posStr) {
            completedActions[posStr] = true;
            if (ev.Feedback) addLog(ev.Feedback, true);
            updateButtons(ev);
            return;
        }
        if (num === 4 && history.length > 1) {
            history.pop(); playerPos = {...history[history.length-1]};
            totalDistance += 10; updateState();
        } else if (nextCoord) {
            const p = nextCoord.split('-');
            playerPos = { x: Number(p[0]), y: Number(p[1]) };
            history.push({...playerPos}); totalDistance += 10; updateState();
        }
    }

    function drawMinimap() {
        const canvas = document.getElementById('minimap-canvas');
        const ctx = canvas.getContext('2d');
        const ts = 6.5, off = 8;
        ctx.clearRect(0, 0, 120, 120);
        mapData.forEach((row, y) => { row.forEach((tile, x) => {
            let c = 'transparent';
            if (tile === '1' || tile === 'S') c = '#221100';
            else if (tile === 'P' || tile === 'N') c = 'var(--amber)';
            else if (tile === 'Q') c = 'var(--green)';
            else if (tile === 'G') c = 'var(--red)';
            if(tile !== '0') { ctx.fillStyle = c; ctx.fillRect(x*ts+off, y*ts+off, ts-1, ts-1); }
        }); });
        ctx.fillStyle = "#fff"; ctx.shadowBlur = 4; ctx.shadowColor = "#fff";
        ctx.fillRect(playerPos.x*ts+off, playerPos.y*ts+off, ts-1, ts-1);
        ctx.shadowBlur = 0;
    }
    function renderLoop() { drawMinimap(); requestAnimationFrame(renderLoop); }
    window.onload = init;
</script>
</body>
</html>

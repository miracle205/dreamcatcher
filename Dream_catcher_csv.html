<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DREAMCATCHER - DIVE STATION v1.5</title>
    <style>
        :root { --main-orange: #FF8C00; --bg-black: #050505; --tile-size: 14px; }
       
        /* 모바일 번쩍임 및 기본 터치 방지 */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: var(--bg-black); color: var(--main-orange); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; touch-action: none; }

        header { padding: 10px 15px; border-bottom: 2px solid var(--main-orange); background: #1a0f00; flex-shrink: 0; }
        #dive-id { font-size: 1.1em; font-weight: 900; color: #fff; text-shadow: 0 0 5px var(--main-orange); }

        /* 로그 섹션: 스크롤 최적화 및 타자기용 */
        #log-section { flex: 4; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid #331a00; -webkit-overflow-scrolling: touch; }
        .msg { margin-bottom: 12px; font-size: 0.95em; line-height: 1.6; word-break: break-all; }
        .msg.me { border-left: 3px solid var(--main-orange); padding-left: 12px; }
        .msg.system { color: #888; font-size: 0.85em; text-align: center; background: #111; padding: 5px; margin: 10px 0; border: 1px dashed #333; }

        /* 맵 섹션 */
        #map-section { flex: 6; display: flex; justify-content: center; align-items: center; background: #000; position: relative; overflow: hidden; }
        #map-grid { display: grid; border: 1px solid #442200; }
        .tile { width: var(--tile-size); height: var(--tile-size); border: 0.1px solid #1a0d00; }
        .tile.wall { background: #111; }
        .tile.path { background: #1a0f00; }
        .tile.player { background: #fff; box-shadow: 0 0 10px #fff; border-radius: 50%; z-index: 5; position: relative; }
        .tile.clue { background: var(--main-orange); animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }

        /* 조작패널 */
        #controls { position: absolute; bottom: 15px; right: 15px; display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; }
        .btn { width: 60px; height: 60px; background: rgba(255,140,0,0.2); border: 2px solid var(--main-orange); color: var(--main-orange); display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 12px; font-size: 1.4em; touch-action: manipulation; }
        .btn:active { background: var(--main-orange); color: #000; }
    </style>
</head>
<body onclick="nextScenario()">

<header>
    <div id="dive-id">DIVE_MODE: READY</div>
    <div id="map-name" style="font-size: 0.7em; opacity: 0.7;">[SCANNING CORE DATA...]</div>
</header>

<div id="log-section">
    </div>

<div id="map-section" onclick="event.stopPropagation()">
    <div id="map-grid"></div>
    <div id="controls">
        <div></div><div class="btn" onclick="move(0, -1)">▲</div><div></div>
        <div class="btn" onclick="move(-1, 0)">◀</div><div class="btn" onclick="move(0, 1)">▼</div><div class="btn" onclick="move(1, 0)">▶</div>
    </div>
</div>

<script>
    let scenarioData = [];
    let mapData = [];
    let currentIdx = 0;
    let playerPos = { x: 0, y: 0 };
    let isTyping = false;
    let typingTimer;
    let lastTypingElement;
    let lastFullContent = "";

    async function init() {
        try {
            const [resSce, resMap] = await Promise.all([
                fetch('./scenario.csv'),
                fetch('./map.csv')
            ]);

            const sceText = await resSce.text();
            scenarioData = sceText.split('\n').filter(r => r.trim()).map(r => r.split(',').map(c => c.trim()));
           
            const titleRow = scenarioData.find(r => r[0] === 'TITLE');
            if(titleRow) document.getElementById('dive-id').innerText = titleRow[2];

            const mapText = await resMap.text();
            const mapRows = mapText.split('\n').filter(r => r.trim());
            document.getElementById('map-name').innerText = `LOCATION: ${mapRows[0].split(',')[1]}`;
            mapData = mapRows.slice(1).map(r => r.split(',').map(c => c.trim()));

            renderMap();
            addLog('system', '[SYSTEM] 데이터 인양 동기화 완료. 터치하여 진행하십시오.');
        } catch (e) {
            addLog('system', 'ERROR: 데이터 인양 실패. 파일명(소문자)과 경로를 확인하세요.');
        }
    }

    // 기존 호출부와 호환되는 중앙 로그 함수
    function addLog(type, text) {
        const logSec = document.getElementById('log-section');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
       
        // 시스템 메시지는 즉시 출력, 일반 대사는 타자기 효과
        if (type === 'system' || text.length < 5) {
            div.innerHTML = text;
            logSec.appendChild(div);
            logSec.scrollTop = logSec.scrollHeight;
        } else {
            logSec.appendChild(div);
            lastTypingElement = div;
            lastFullContent = text; // 스킵 대비용 저장
            runTypewriter(div, text);
        }
    }

    function runTypewriter(container, text) {
        isTyping = true;
        let charIdx = 0;
        const logSec = document.getElementById('log-section');
        container.innerHTML = "";

        function type() {
            if (charIdx < text.length) {
                // HTML 태그 처리 로직 (간단한 strong 대응)
                if (text.substr(charIdx, 8) === "<strong>") {
                    const endTagIdx = text.indexOf("</strong>", charIdx) + 9;
                    container.innerHTML += text.substring(charIdx, endTagIdx);
                    charIdx = endTagIdx;
                } else {
                    container.innerHTML += text.charAt(charIdx);
                    charIdx++;
                }
                logSec.scrollTop = logSec.scrollHeight;
                typingTimer = setTimeout(type, 30);
            } else {
                isTyping = false;
            }
        }
        type();
    }

    function completeImmediately() {
        clearTimeout(typingTimer);
        if (lastTypingElement) {
            lastTypingElement.innerHTML = lastFullContent;
        }
        isTyping = false;
        const logSec = document.getElementById('log-section');
        logSec.scrollTop = logSec.scrollHeight;
    }

    function renderMap() {
        const grid = document.getElementById('map-grid');
        if (!mapData.length) return;
        grid.style.gridTemplateColumns = `repeat(${mapData[0].length}, var(--tile-size))`;
        grid.innerHTML = '';

        for (let y = 0; y < mapData.length; y++) {
            for (let x = 0; x < mapData[y].length; x++) {
                const tile = document.createElement('div');
                tile.id = `tile-${x}-${y}`;
                tile.className = 'tile ' + (mapData[y][x] === '0' ? 'wall' : mapData[y][x] === '1' ? 'path' : mapData[y][x] === 'E' ? 'clue' : mapData[y][x] === 'C' ? 'clue' : '');
                if (mapData[y][x] === 'P') { tile.classList.add('player'); playerPos = { x, y }; }
                grid.appendChild(tile);
            }
        }
    }

    function nextScenario() {
        if (isTyping) {
            completeImmediately();
            return;
        }

        const lines = scenarioData.filter(r => r[0] !== 'TITLE' && r[0] !== 'Type');
        if (currentIdx >= lines.length) {
            addLog('system', '[END] 시나리오의 끝입니다. 최종 자아를 인양하십시오.');
            return;
        }

        const [type, sender, content] = lines[currentIdx];
        addLog(type, `<strong>${sender}:</strong> ${content}`);
        currentIdx++;
    }

    function move(dx, dy) {
        const nx = playerPos.x + dx, ny = playerPos.y + dy;
        if (ny >= 0 && ny < mapData.length && nx >= 0 && nx < mapData[0].length && mapData[ny][nx] !== '0') {
            document.getElementById(`tile-${playerPos.x}-${playerPos.y}`).classList.remove('player');
            playerPos = { x: nx, y: ny };
            document.getElementById(`tile-${playerPos.x}-${playerPos.y}`).classList.add('player');
           
            // 이동 중 이벤트 발생 시에도 기존 addLog 호출
            if (mapData[ny][nx] === 'E') addLog('system', '[DETECTED] 기억의 파편을 감지했습니다.');
            if (mapData[ny][nx] === 'C') addLog('system', '[CRITICAL] 최종 자아 코어에 도달했습니다!');
        }
    }

    window.onload = init;
</script>
</body>
</html>
</html>
